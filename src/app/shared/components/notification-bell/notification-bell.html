<!-- shared/components/notification-bell/notification-bell.html -->
<div class="relative z-[9999]">

    <!-- Botón campana -->
    <button (click)="toggle()"
        class="w-9 h-9 rounded-xl flex items-center justify-center border relative cursor-pointer transition-colors"
        style="background:#F0F4FA;border-color:#D6E0F0;" onmouseover="this.style.background='#E4ECF7'"
        onmouseout="this.style.background='#F0F4FA'">
        <lucide-icon name="bell" [size]="16" [strokeWidth]="2" color="#1B3A6B"></lucide-icon>
        <!-- Badge -->
        <span *ngIf="unreadCount > 0"
            class="absolute -top-1 -right-1 min-w-[16px] h-4 px-1 rounded-full flex items-center justify-center text-[9px] font-bold"
            style="background:#dc2626;color:#fff;line-height:1;">
            {{ unreadCount > 99 ? '99+' : unreadCount }}
        </span>
    </button>

    <!-- Dropdown -->
    <div *ngIf="isOpen" class="absolute right-0 mt-2 w-80 rounded-2xl overflow-hidden shadow-xl border z-[1000]"
        style="background:rgba(255,255,255,0.98);border-color:#D6E0F0;backdrop-filter:blur(12px);">

        <!-- Header -->
        <div class="flex items-center justify-between px-4 py-3 border-b"
            style="border-color:#EDF2FA;background:#F8FAFD;">
            <span class="text-[13px] font-bold" style="color:#1B3A6B;">Notificaciones</span>
            <button *ngIf="unreadCount > 0" (click)="markAllRead()"
                class="text-[10px] font-semibold cursor-pointer px-2 py-0.5 rounded-lg transition-colors"
                style="color:#2d5fa8;background:transparent;" onmouseover="this.style.background='#EDF3FC'"
                onmouseout="this.style.background='transparent'">
                Marcar todas leídas
            </button>
        </div>

        <!-- Lista -->
        <div class="overflow-y-auto" style="max-height:320px;scrollbar-width:thin;">

            <div *ngIf="notifications.length === 0" class="px-4 py-8 text-center">
                <div class="mx-auto mb-2 w-8 h-8 flex items-center justify-center">
                    <lucide-icon name="bell-off" [size]="28" [strokeWidth]="1.5" color="#B0BDD0"></lucide-icon>
                </div>
                <p class="text-[11px]" style="color:#8A9DC0;">Sin notificaciones</p>
            </div>

            <button *ngFor="let n of notifications" (click)="markAsRead(n)"
                class="w-full flex items-start gap-3 px-4 py-3 text-left cursor-pointer transition-colors border-b"
                [style.background]="n.is_read ? 'transparent' : '#F0F6FF'" style="border-color:#F0F4FA;"
                onmouseover="this.style.background=this.style.background==='transparent'?'#F8FAFD':this.style.background"
                onmouseout="this.style.background=this.dataset.bg"
                [attr.data-bg]="n.is_read ? 'transparent' : '#F0F6FF'">

                <!-- Icono -->
                <div class="w-8 h-8 rounded-xl flex items-center justify-center flex-shrink-0 mt-0.5"
                    [style.background]="n.is_read ? '#F0F4FA' : '#DBEAFE'">
                    <lucide-icon name="clipboard-check" [size]="14" [strokeWidth]="2"
                        [color]="n.is_read ? '#8A9DC0' : '#2d5fa8'"></lucide-icon>
                </div>

                <!-- Contenido -->
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2">
                        <p class="text-[11px] font-bold truncate" [style.color]="n.is_read ? '#4A6A9B' : '#1B3A6B'">
                            {{ n.title }}
                        </p>
                        <span *ngIf="!n.is_read" class="w-2 h-2 rounded-full flex-shrink-0"
                            style="background:#2d5fa8;"></span>
                    </div>
                    <p class="text-[10px] mt-0.5 leading-snug" style="color:#8A9DC0;">{{ n.message }}</p>
                    <p class="text-[9px] mt-1" style="color:#B0BDD0;">{{ getTimeAgo(n.created_at) }}</p>
                </div>

            </button>

        </div>

    </div>

</div>
