<div *ngIf="totalPages > 1" class="border-t px-5 py-4 flex items-center justify-between gap-3 flex-wrap"
    style="border-color:#D6E0F0;">

    <p *ngIf="showCounter" class="text-[12px]" style="color:#4A6A9B;">
        Mostrando {{ rangeStart }} a {{ rangeEnd }} de {{ totalItems }} {{ itemLabel }}
    </p>
    <span *ngIf="!showCounter"></span>

    <div class="flex items-center gap-2">

        <button [disabled]="currentPage === 1" (click)="prev()"
            class="px-3 py-1.5 text-[12px] font-semibold rounded-lg border cursor-pointer transition disabled:cursor-not-allowed"
            style="background:#F0F4FA;color:#4A6A9B;border-color:#D6E0F0"
            [class.opacity-40]="currentPage === 1">
            Anterior
        </button>

        <span class="text-[12px]" style="color:#1B3A6B;">
            Página {{ currentPage }} de {{ totalPages }}
        </span>

        <button [disabled]="currentPage === totalPages" (click)="next()"
            class="px-3 py-1.5 text-[12px] font-semibold rounded-lg border cursor-pointer transition disabled:cursor-not-allowed"
            style="background:#F0F4FA;color:#4A6A9B;border-color:#D6E0F0"
            [class.opacity-40]="currentPage === totalPages">
            Siguiente
        </button>

    </div>

</div>
