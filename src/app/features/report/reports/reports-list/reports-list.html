<div class="min-h-screen">

    <!-- PAGE HEADER -->
    <div class="px-4 sm:px-6 pt-7 pb-6">
        <div class="flex flex-wrap items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <div class="w-11 h-11 rounded-2xl flex items-center justify-center shrink-0 shadow-sm"
                    style="background: linear-gradient(135deg, #1B3A6B, #2d5fa8);">
                    <lucide-icon name="file-text" [size]="20" [strokeWidth]="1.8" color="white"></lucide-icon>
                </div>
                <div>
                    <h1 class="text-[20px] font-bold leading-none" style="color: #1B3A6B;">
                        Reportes operativos
                    </h1>
                    <p class="text-sm mt-1" style="color: #4A6A9B;">
                        Registro y administración · Por estrategia
                    </p>
                </div>
            </div>
            <a *ngIf="!isViewer" [routerLink]="['create']"
                class="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl text-[13px] font-bold transition-all duration-150 shadow-sm cursor-pointer"
                style="background: linear-gradient(135deg, #1B3A6B 0%, #2d5fa8 100%); color: white;"
                onmouseover="this.style.filter='brightness(1.1)'" onmouseout="this.style.filter='none'">
                <lucide-icon name="plus" [size]="16" [strokeWidth]="2.2" color="currentColor"></lucide-icon>
                Nuevo reporte
            </a>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8 space-y-6 relative z-[1]">

        <app-page-state
            [state]="pageState"
            loadingMessage="Cargando registros..."
            errorMessage="No se pudieron cargar los reportes"
            emptyMessage="Sin reportes registrados"
            emptyHint="Usa el botón Nuevo reporte para crear el primer registro operativo"
            emptyIcon="file-text"
            (retry)="reload()">

            <ng-container *ngIf="reports.length > 0">

                <!-- TABLA -->
                <div class="space-y-0" #tableSection>
                    <div class="h-[3px] w-full rounded-t-xl"
                        style="background: linear-gradient(90deg, #1B3A6B 0%, #2d5fa8 50%, #1B3A6B 100%);"></div>

                    <div class="rounded-b-xl overflow-hidden border" style="border-color: #D6E0F0; background: white;">

                        <div class="flex items-center justify-between gap-3 px-5 py-4 border-b"
                            style="border-color: #D6E0F0; background: #F8FAFD;">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0"
                                    style="background: #D6E4F7;">
                                    <lucide-icon name="list" [size]="14" [strokeWidth]="2.2" color="#1B3A6B"></lucide-icon>
                                </div>
                                <div>
                                    <span class="text-[11px] font-bold uppercase tracking-[1px]"
                                        style="color: #1B3A6B;">
                                        Registros
                                    </span>
                                    <p class="text-[10.5px] mt-0.5" style="color: #8A9DC0;">
                                        Administración y edición de reportes
                                    </p>
                                </div>
                            </div>
                            <span class="text-[11px] font-semibold px-3 py-1 rounded-full"
                                style="background: #D6E4F7; border: 1px solid #B3CCE8; color: #1B3A6B;">
                                {{ reports.length }} {{ reports.length === 1 ? 'reporte' : 'reportes' }}
                            </span>
                        </div>

                        <div class="p-5">
                            <app-reports-table [reports]="reports" [strategyMap]="strategyMap"
                                [componentMap]="componentMap" [currentUserId]="currentUserId" [isViewer]="isViewer" [isAdmin]="isAdmin"
                                [chartFilter]="chartFilter" (delete)="deleteReport($event)"
                                (clearFilter)="clearChartFilter()">
                            </app-reports-table>
                        </div>

                    </div>
                </div>

            </ng-container>

        </app-page-state>

    </div>

</div>
