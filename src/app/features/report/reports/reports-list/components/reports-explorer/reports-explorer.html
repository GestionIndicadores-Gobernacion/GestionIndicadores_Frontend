<div class="space-y-5">

    <!-- Fila de filtros -->
    <div class="flex flex-wrap gap-3">

        <div class="flex flex-col gap-1.5 min-w-48 flex-1">
            <label class="text-xs font-medium text-zinc-500 uppercase tracking-widest">Estrategia</label>
            <select (change)="onStrategySelect($event)" class="text-sm border border-zinc-200 rounded-xl px-3 py-2.5 bg-white text-zinc-900
               focus:outline-none focus:ring-2 focus:ring-zinc-300 transition-colors
               hover:border-zinc-300 cursor-pointer">
                <option *ngFor="let id of strategyIds" [value]="id" [selected]="id === selectedStrategyId">
                    {{ strategyMap[id] }}
                </option>
            </select>
        </div>

        <div class="flex flex-col gap-1.5 min-w-48 flex-1">
            <label class="text-xs font-medium text-zinc-500 uppercase tracking-widest">Componente</label>
            <select (change)="onComponentSelect($event)" [disabled]="components.length === 0" class="text-sm border border-zinc-200 rounded-xl px-3 py-2.5 bg-white text-zinc-900
               focus:outline-none focus:ring-2 focus:ring-zinc-300 transition-colors
               hover:border-zinc-300 cursor-pointer
               disabled:opacity-40 disabled:cursor-not-allowed">
                <option value="" [disabled]="true" [selected]="selectedComponentId === null">
                    Selecciona un componente
                </option>
                <option *ngFor="let c of components" [value]="c.component_id">
                    {{ c.component_name }}
                </option>
            </select>
        </div>

    </div>

    <!-- Variables -->
    <div *ngIf="selectedComponentId" class="space-y-2">

        <div *ngIf="loadingComponent" class="flex items-center gap-2 py-1">
            <div class="w-3.5 h-3.5 border-2 border-zinc-200 border-t-zinc-500 rounded-full animate-spin"></div>
            <span class="text-xs text-zinc-400">Cargando variables...</span>
        </div>

        <p *ngIf="!loadingComponent && indicators.length === 0" class="text-xs text-zinc-400 py-1">
            Este componente no tiene variables registradas
        </p>

        <ng-container *ngIf="!loadingComponent && indicators.length > 0">
            <label class="text-xs font-medium text-zinc-500 uppercase tracking-widest">Variable</label>
            <div class="flex flex-wrap gap-2 mt-1.5">
                <button *ngFor="let ind of visibleIndicators" (click)="onIndicatorSelect(ind)"
                    [class.bg-zinc-900]="selectedIndicator?.indicator_id === ind.indicator_id"
                    [class.text-white]="selectedIndicator?.indicator_id === ind.indicator_id"
                    [class.border-zinc-900]="selectedIndicator?.indicator_id === ind.indicator_id"
                    [class.bg-white]="selectedIndicator?.indicator_id !== ind.indicator_id"
                    [class.text-zinc-600]="selectedIndicator?.indicator_id !== ind.indicator_id"
                    [class.border-zinc-200]="selectedIndicator?.indicator_id !== ind.indicator_id"
                    class="px-3 py-1.5 rounded-full text-xs font-medium border transition-all duration-150 hover:border-zinc-400 hover:shadow-sm">
                    {{ ind.indicator_name }}
                </button>

                <!-- Botón ver más / ver menos -->
                <button *ngIf="hiddenCount > 0 || showAllIndicators" (click)="toggleShowAll()"
                    class="px-3 py-1.5 rounded-full text-xs font-medium border border-dashed border-zinc-300 text-zinc-400 hover:border-zinc-400 hover:text-zinc-600 transition-all duration-150">
                    {{ showAllIndicators ? 'Ver menos' : '+' + hiddenCount + ' más' }}
                </button>
            </div>
        </ng-container>

    </div>

    <!-- Gráfico -->
    <app-reports-explorer-chart [componentAggregate]="componentAggregate" [selectedIndicator]="selectedIndicator"
        [indicatorDetail]="selectedIndicatorDetail" [selectedYear]="selectedYear" (yearChange)="onYearChange($event)">
    </app-reports-explorer-chart>

</div>
