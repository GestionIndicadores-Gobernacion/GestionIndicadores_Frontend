<div class="rounded-2xl border border-zinc-200 bg-white overflow-hidden">

    <!-- HEADER -->
    <div class="px-4 py-3 text-white text-sm font-semibold flex items-center gap-2"
        style="background:linear-gradient(135deg,#1B3A6B 0%,#2d5fa8 100%)">
        <svg class="w-4 h-4 opacity-90" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 7h16M4 12h16M4 17h10" />
        </svg>
        <span>Seleccionar dataset</span>
    </div>

    <!-- BODY -->
    <div class="p-4 bg-[#F8FAFF] space-y-3">

        <!-- LOADING -->
        <div *ngIf="loading" class="flex items-center gap-3 p-3 bg-white border border-zinc-200 rounded-xl">
            <div class="w-4 h-4 border-2 border-[#2d5fa8] border-t-transparent rounded-full animate-spin"></div>
            <span class="text-xs text-zinc-600">Cargando datasets...</span>
        </div>

        <!-- ERROR -->
        <div *ngIf="error" class="p-3 bg-red-50 border border-red-200 rounded-xl">
            <p class="text-xs text-red-600">{{ error }}</p>
        </div>

        <!-- SEARCH + LIST -->
        <div *ngIf="!loading && !error" class="space-y-3">

            <!-- SEARCH -->
            <div class="relative">

                <div class="absolute left-3 top-1/2 -translate-y-1/2 text-[#2d5fa8]">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.3-4.3" />
                        <circle cx="11" cy="11" r="7" />
                    </svg>
                </div>

                <input type="text" [(ngModel)]="search" (ngModelChange)="filter()"
                    placeholder="Buscar actor por nombre..." class="w-full pl-9 pr-3 py-2.5 text-sm rounded-xl border border-zinc-200
                 bg-[#F0F4FA] text-zinc-900
                 focus:outline-none focus:ring-2 focus:ring-[#2d5fa8] focus:border-[#1B3A6B]" />

            </div>

            <!-- LIST -->
            <div class="max-h-44 overflow-y-auto border border-zinc-200 rounded-xl bg-white divide-y">

                <div *ngFor="let opt of filteredOptions" (click)="select(opt)"
                    class="px-4 py-3 text-sm cursor-pointer transition" [class.bg-[#1B3A6B]]="value === opt.id"
                    [class.text-white]="value === opt.id" [class.hover:bg-blue-50]="value !== opt.id">
                    {{ opt.label }}
                </div>

                <div *ngIf="filteredOptions.length === 0" class="p-4 text-xs text-zinc-400 text-center">
                    No se encontraron actores
                </div>

            </div>

        </div>

        <!-- SELECTED -->
        <div *ngIf="value" class="flex items-center gap-2 px-3 py-2 rounded-xl border border-blue-200 bg-blue-50">
            <span class="text-xs text-[#1B3A6B] font-medium">Seleccionado:</span>
            <span class="text-xs font-semibold text-zinc-900">
                {{ selectedLabel }}
            </span>
        </div>

    </div>

</div>
