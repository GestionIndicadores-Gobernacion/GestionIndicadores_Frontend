<div class="w-full space-y-3">

    <!-- Archivo cargado -->
    <div *ngIf="fileVal" class="flex items-center gap-3 p-4 bg-white border border-zinc-200 rounded-xl shadow-sm">

        <!-- Icono -->
        <div class="flex items-center justify-center w-10 h-10 rounded-lg bg-zinc-100">
            <svg class="w-5 h-5 text-zinc-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
            </svg>
        </div>

        <!-- Info -->
        <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-zinc-900 truncate">
                {{ fileVal.file_name }}
            </p>

            <p class="text-xs text-zinc-500 mt-0.5">
                {{ fileVal.file_size_mb }} MB
            </p>
        </div>

        <!-- Acciones -->
        <div class="flex items-center gap-2">

            <a [href]="fileVal.file_url" target="_blank" class="text-xs px-3 py-1 rounded-md border border-zinc-200
                hover:bg-zinc-50 transition">
                Ver
            </a>

            <button type="button" (click)="remove.emit()" class="flex items-center justify-center w-8 h-8 rounded-md
               text-red-500 hover:bg-red-50 transition">

                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>

            </button>

        </div>

    </div>

    <!-- Upload -->
    <div *ngIf="!fileVal">

        <label class="group flex flex-col items-center justify-center gap-3
             p-8 border-2 border-dashed border-zinc-300 rounded-xl
             bg-zinc-50 hover:bg-white hover:border-zinc-400
             transition cursor-pointer" [class.opacity-60]="uploading" [class.pointer-events-none]="uploading">

            <!-- Normal -->
            <ng-container *ngIf="!uploading">

                <div class="flex items-center justify-center w-12 h-12 rounded-xl bg-white border border-zinc-200">
                    <svg class="w-6 h-6 text-zinc-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">

                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />

                    </svg>
                </div>

                <p class="text-sm text-zinc-600 font-medium">
                    Subir archivo
                </p>

                <p class="text-xs text-zinc-500">
                    Haz clic para seleccionar
                </p>

            </ng-container>

            <!-- Uploading -->
            <ng-container *ngIf="uploading">

                <div class="w-6 h-6 border-2 border-zinc-300 border-t-zinc-900 rounded-full animate-spin"></div>

                <p class="text-sm text-zinc-500">
                    Subiendo archivo...
                </p>

            </ng-container>

            <input type="file" class="hidden" [accept]="accept" (change)="fileSelected.emit($event)" />

        </label>

    </div>

    <!-- Error -->
    <p *ngIf="uploadError" class="text-xs text-red-600 font-medium">
        {{ uploadError }}
    </p>

</div>
