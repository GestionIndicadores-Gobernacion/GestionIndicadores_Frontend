<div class="rounded-2xl border border-zinc-200 bg-white overflow-hidden">

    <!-- Header -->
    <div class="px-4 py-3 text-white text-sm font-semibold flex items-center gap-2"
        style="background:linear-gradient(135deg,#1B3A6B 0%,#2d5fa8 100%)">
        <svg class="w-4 h-4 opacity-90" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 7h16M4 12h16M4 17h10" />
        </svg>
        <span>Texo</span>
    </div>

    <!-- Field -->
    <div class="p-4 bg-[#F8FAFF]">

        <div class="relative">

            <!-- Icon -->
            <div class="absolute left-3 top-3 text-[#2d5fa8] pointer-events-none">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 20h9" />
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M16.5 3.5a2.1 2.1 0 113 3L7 19l-4 1 1-4 12.5-12.5z" />
                </svg>
            </div>

            <!-- Textarea -->
            <textarea rows="3" [ngModel]="value" (ngModelChange)="valueChange.emit($event)"
                placeholder="Escribe aquí..." class="w-full pl-9 pr-3 py-2.5 text-sm rounded-xl border border-zinc-200
               bg-[#F0F4FA] text-zinc-900 resize-none
               placeholder:text-zinc-400
               focus:outline-none focus:ring-2 focus:ring-[#2d5fa8] focus:border-[#1B3A6B]
               hover:border-[#2d5fa8]
               transition-all duration-200">
      </textarea>

        </div>

    </div>

</div>
