<div class="rounded-2xl border border-zinc-200 bg-white overflow-hidden">

    <!-- Header -->
    <div class="px-4 py-3 text-white text-sm font-semibold flex items-center gap-2"
        style="background:linear-gradient(135deg,#1B3A6B 0%,#2d5fa8 100%)">
        <lucide-icon name="list" [size]="16" [strokeWidth]="2" color="currentColor" class="opacity-90"></lucide-icon>
        <span>Texo</span>
    </div>

    <!-- Field -->
    <div class="p-4 bg-[#F8FAFF]">

        <div class="relative">

            <!-- Icon -->
            <div class="absolute left-3 top-3 text-[#2d5fa8] pointer-events-none inline-flex">
                <lucide-icon name="pencil" [size]="16" [strokeWidth]="2" color="currentColor"></lucide-icon>
            </div>

            <!-- Textarea -->
            <textarea rows="3" [ngModel]="value" (ngModelChange)="valueChange.emit($event)"
                placeholder="Escribe aquí..." class="w-full pl-9 pr-3 py-2.5 text-sm rounded-xl border border-zinc-200
               bg-[#F0F4FA] text-zinc-900 resize-none
               placeholder:text-zinc-400
               focus:outline-none focus:ring-2 focus:ring-[#2d5fa8] focus:border-[#1B3A6B]
               hover:border-[#2d5fa8]
               transition-all duration-200">
      </textarea>

        </div>

    </div>

</div>
