<div class="rounded-2xl border border-zinc-200 bg-white overflow-hidden">

    <!-- Header -->
    <div class="px-4 py-3 text-white text-sm font-semibold flex items-center gap-2"
        style="background:linear-gradient(135deg,#1B3A6B 0%,#2d5fa8 100%)">
        <svg class="w-4 h-4 opacity-90" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h10M10 5h4" />
        </svg>
        <span>Registro de valores</span>
    </div>

    <!-- Fields -->
    <div class="p-4 space-y-3 bg-[#F8FAFF]">

        <div *ngFor="let field of indicator.config?.fields"
            class="flex items-center gap-3 p-3 rounded-xl border border-zinc-200 bg-[#F0F4FA] hover:border-[#2d5fa8] transition-all">

            <!-- Label -->
            <label class="flex-1 text-sm font-medium text-zinc-700 leading-tight">
                {{ field }}
            </label>

            <!-- Input -->
            <div class="relative w-28">

                <input type="number" [ngModel]="(value || {})[field]" (ngModelChange)="setField(field, $event)"
                    placeholder="0" min="0" class="w-full px-3 py-2 text-sm text-right rounded-xl border border-zinc-200
                 bg-white text-zinc-900
                 focus:outline-none focus:ring-2 focus:ring-[#2d5fa8] focus:border-[#1B3A6B]
                 hover:border-[#2d5fa8]
                 transition-all duration-200" />

            </div>

        </div>

    </div>

    <!-- Total -->
    <div class="flex items-center justify-between px-4 py-3 text-white"
        style="background:linear-gradient(135deg,#1B3A6B 0%,#2d5fa8 100%)">
        <span class="text-xs font-semibold uppercase tracking-wider">
            Total
        </span>

        <span class="text-lg font-bold tabular-nums">
            {{ total }}
        </span>
    </div>

</div>
