<div class="min-h-screen">

  <!-- PAGE HEADER -->
  <div class="px-6 pt-7 pb-6">
    <div class="flex items-center justify-between gap-4">

      <div class="flex items-center gap-4">
        <div class="w-11 h-11 rounded-2xl flex items-center justify-center shrink-0 shadow-sm"
          style="background:linear-gradient(135deg,#1B3A6B,#2d5fa8);">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="1.8" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M3 3v18h18" />
            <path d="M7 15l4-4 3 3 4-6" />
          </svg>
        </div>
        <div>
          <h1 class="text-[20px] font-bold leading-none" style="color:#1B3A6B;">Estrategias</h1>
          <p class="text-sm mt-1" style="color:#4A6A9B;">
            Gestión y administración de estrategias institucionales
          </p>
        </div>
      </div>

      <div class="flex items-center gap-3">

        <!-- FILTRO AÑO (solo en dashboard) -->
        <div *ngIf="viewMode === 'dashboard' && availableYears.length > 0"
          class="flex items-center gap-2 px-3 py-2 rounded-xl border" style="border-color:#D6E0F0;background:white;">
          <svg class="w-3.5 h-3.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="#4A6A9B" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
          </svg>
          <select [value]="selectedYear" (change)="onYearChange(+$any($event.target).value)"
            class="text-[12px] font-semibold outline-none cursor-pointer bg-transparent" style="color:#1B3A6B;">
            <option *ngFor="let y of availableYears" [value]="y">{{ y }}</option>
          </select>
        </div>

        <!-- TOGGLE -->
        <div class="flex items-center rounded-xl overflow-hidden border" style="border-color:#D6E0F0;">
          <button (click)="setView('list')"
            class="flex items-center gap-1.5 px-3 py-2 text-[11px] font-bold transition-all cursor-pointer"
            [style.background]="viewMode === 'list' ? 'linear-gradient(135deg,#1B3A6B,#2d5fa8)' : 'white'"
            [style.color]="viewMode === 'list' ? 'white' : '#4A6A9B'">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
              stroke-linecap="round">
              <line x1="8" y1="6" x2="21" y2="6" />
              <line x1="8" y1="12" x2="21" y2="12" />
              <line x1="8" y1="18" x2="21" y2="18" />
              <line x1="3" y1="6" x2="3.01" y2="6" />
              <line x1="3" y1="12" x2="3.01" y2="12" />
              <line x1="3" y1="18" x2="3.01" y2="18" />
            </svg>
            Lista
          </button>
          <button (click)="setView('dashboard')"
            class="flex items-center gap-1.5 px-3 py-2 text-[11px] font-bold transition-all cursor-pointer"
            [style.background]="viewMode === 'dashboard' ? 'linear-gradient(135deg,#1B3A6B,#2d5fa8)' : 'white'"
            [style.color]="viewMode === 'dashboard' ? 'white' : '#4A6A9B'">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
              stroke-linecap="round">
              <path d="M3 3v18h18" />
              <path d="M7 15l4-4 3 3 4-6" />
            </svg>
            Dashboard
          </button>
        </div>

        <button (click)="goToCreate()" [disabled]="loading"
          class="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl text-[13px] font-bold shadow-sm cursor-pointer"
          style="background:linear-gradient(135deg,#1B3A6B,#2d5fa8);color:white;"
          onmouseover="this.style.filter='brightness(1.1)'" onmouseout="this.style.filter='none'">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round">
            <path d="M12 4v16m8-8H4" />
          </svg>
          Nueva estrategia
        </button>

      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-8 space-y-6">

    <div *ngIf="loading && viewMode === 'list'" class="flex items-center gap-3 py-8">
      <div class="w-4 h-4 rounded-full animate-spin" style="border:2px solid #D6E0F0;border-top-color:#1B3A6B;"></div>
      <span class="text-[13px]" style="color:#8A9DC0;">Cargando estrategias...</span>
    </div>

    <ng-container *ngIf="!loading && viewMode === 'list'">
      <div *ngIf="strategies.length === 0" class="rounded-2xl p-16 text-center border"
        style="background:white;border-color:#D6E0F0;">
        <div class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-5" style="background:#F0F4FA;">
          <svg class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke-width="1.5" style="color:#4A6A9B;"
            stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3v18h18" />
            <path d="M7 15l4-4 3 3 4-6" />
          </svg>
        </div>
        <h3 class="text-sm font-bold" style="color:#1B3A6B;">Sin estrategias registradas</h3>
        <p class="text-xs mt-1 max-w-xs mx-auto leading-relaxed" style="color:#4A6A9B;">
          Usa el botón <strong>Nueva estrategia</strong> para crear la primera estrategia institucional
        </p>
      </div>
      <app-strategy-table *ngIf="strategies.length > 0" [strategies]="strategies" (edit)="goToEdit($event)"
        (delete)="deleteStrategy($event)">
      </app-strategy-table>
    </ng-container>

    <app-strategy-dashboard *ngIf="viewMode === 'dashboard'" [strategies]="dashboardStrategies"
      [loading]="loadingDashboard" [selectedYear]="selectedYear" (edit)="goToEdit($event)"
      (delete)="deleteStrategy($event)">
    </app-strategy-dashboard>

  </div>
</div>
