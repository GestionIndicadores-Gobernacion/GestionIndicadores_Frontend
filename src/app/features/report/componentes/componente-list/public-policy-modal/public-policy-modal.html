<!-- BACKDROP -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4"
    style="background:rgba(15,30,60,0.45);backdrop-filter:blur(2px)">

    <div class="w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden flex flex-col"
        style="background:white;max-height:90vh">

        <!-- Barra superior -->
        <div class="h-[4px] bg-gradient-to-r from-[#1B3A6B] via-[#2d5fa8] to-[#1B3A6B]"></div>

        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-[#D6E0F0] bg-[#F4F7FC]">
            <div>
                <span class="text-[13px] font-bold text-[#1B3A6B]">Gestión de Políticas Públicas</span>
                <p class="text-[11px] text-[#7C94BD] mt-0.5">
                    Administra las acciones de la política de protección Animal
                </p>
            </div>
            <button (click)="close()" class="p-2 rounded-lg hover:bg-[#E8EEF7] transition cursor-pointer">
                <svg class="w-4 h-4 text-[#4A6A9B]" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Toolbar: buscador + botón nueva -->
        <div class="flex items-center gap-3 px-6 py-3 border-b border-[#D6E0F0]">
            <div class="relative flex-1">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none w-3.5 h-3.5 text-[#9CA3AF]"
                    fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <input type="text" [(ngModel)]="search" placeholder="Buscar por código o descripción..." class="w-full text-[12px] rounded-xl pl-9 pr-4 py-2 bg-[#F0F4FA] border border-[#D6E0F0]
            focus:bg-white focus:border-[#2d5fa8] outline-none transition-all" />
            </div>
            <button (click)="toggleNewForm()"
                class="flex items-center gap-1.5 px-3 py-2 rounded-xl text-[11px] font-bold border cursor-pointer transition-all"
                [style.background]="showNewForm ? '#1B3A6B' : 'white'" [style.color]="showNewForm ? 'white' : '#1B3A6B'"
                style="border-color:#D6E0F0">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        [attr.d]="showNewForm ? 'M6 18L18 6M6 6l12 12' : 'M12 4v16m8-8H4'" />
                </svg>
                {{ showNewForm ? 'Cancelar' : 'Nueva' }}
            </button>
        </div>

        <!-- Formulario crear -->
        <div *ngIf="showNewForm" class="px-6 py-4 border-b border-[#D6E0F0] bg-[#F8FAFD] space-y-3">
            <div class="grid grid-cols-[120px_1fr] gap-3">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold uppercase tracking-[1px] text-[#4A6A9B]">Código</label>
                    <input type="text" [(ngModel)]="newCode" placeholder="Ej: 3.9" class="w-full text-[12px] rounded-xl px-3 py-2 bg-[#F0F4FA] border border-[#D6E0F0]
              focus:bg-white focus:border-[#2d5fa8] outline-none transition-all" />
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold uppercase tracking-[1px] text-[#4A6A9B]">Descripción</label>
                    <input type="text" [(ngModel)]="newDescription" placeholder="Descripción de la acción..." class="w-full text-[12px] rounded-xl px-3 py-2 bg-[#F0F4FA] border border-[#D6E0F0]
              focus:bg-white focus:border-[#2d5fa8] outline-none transition-all" />
                </div>
            </div>
            <div class="flex justify-end">
                <button (click)="saveNew()" [disabled]="newSaving || !newCode.trim() || !newDescription.trim()"
                    class="px-4 py-2 rounded-xl text-[12px] font-bold text-white cursor-pointer transition-all disabled:opacity-40"
                    style="background:linear-gradient(135deg,#1B3A6B,#2d5fa8)">
                    {{ newSaving ? 'Guardando...' : 'Guardar política' }}
                </button>
            </div>
        </div>

        <!-- Lista -->
        <div class="overflow-y-auto flex-1 px-6 py-4 space-y-2">

            <div *ngIf="loading" class="flex items-center gap-2 py-6 justify-center">
                <div class="w-4 h-4 rounded-full animate-spin"
                    style="border:2px solid #D6E0F0;border-top-color:#1B3A6B"></div>
                <span class="text-[12px] text-[#8A9DC0]">Cargando...</span>
            </div>

            <div *ngIf="!loading && filteredPolicies.length === 0" class="text-[12px] text-[#8A9DC0] text-center py-8">
                No se encontraron políticas.
            </div>

            <ng-container *ngIf="!loading">
                <div *ngFor="let p of filteredPolicies">

                    <!-- Vista normal -->
                    <div *ngIf="editingPolicy?.id !== p.id"
                        class="flex items-start gap-3 px-4 py-3 rounded-xl border border-[#E8EEF7] bg-[#FAFCFF] group">
                        <span class="text-[11px] font-bold text-[#1B3A6B] shrink-0 w-10 mt-0.5">{{ p.code }}</span>
                        <p class="text-[11.5px] text-[#4A6A9B] flex-1 leading-relaxed">{{ p.description }}</p>
                        <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity shrink-0">
                            <button (click)="startEdit(p)"
                                class="px-2 py-1 text-[10px] font-bold rounded-lg border cursor-pointer transition"
                                style="background:#F0F4FA;color:#4A6A9B;border-color:#D6E0F0">
                                Editar
                            </button>
                            <button (click)="deletePolicy(p)"
                                class="px-2 py-1 text-[10px] font-bold rounded-lg border cursor-pointer transition"
                                style="background:#FEF2F2;color:#dc2626;border-color:#FECACA">
                                Eliminar
                            </button>
                        </div>
                    </div>

                    <!-- Vista edición inline -->
                    <div *ngIf="editingPolicy?.id === p.id"
                        class="px-4 py-3 rounded-xl border border-[#2d5fa8] bg-[#EEF4FB] space-y-2">
                        <div class="grid grid-cols-[120px_1fr] gap-3">
                            <input type="text" [(ngModel)]="editCode" class="text-[12px] rounded-xl px-3 py-2 bg-white border border-[#D6E0F0]
                  focus:border-[#2d5fa8] outline-none transition-all" />
                            <input type="text" [(ngModel)]="editDescription" class="text-[12px] rounded-xl px-3 py-2 bg-white border border-[#D6E0F0]
                  focus:border-[#2d5fa8] outline-none transition-all" />
                        </div>
                        <div class="flex justify-end gap-2">
                            <button (click)="cancelEdit()"
                                class="px-3 py-1.5 text-[11px] font-semibold rounded-lg border cursor-pointer transition"
                                style="background:white;color:#4A6A9B;border-color:#D6E0F0">
                                Cancelar
                            </button>
                            <button (click)="saveEdit()" [disabled]="editSaving"
                                class="px-3 py-1.5 text-[11px] font-bold rounded-lg text-white cursor-pointer transition disabled:opacity-40"
                                style="background:linear-gradient(135deg,#1B3A6B,#2d5fa8)">
                                {{ editSaving ? 'Guardando...' : 'Guardar' }}
                            </button>
                        </div>
                    </div>

                </div>
            </ng-container>

        </div>

        <!-- Footer -->
        <div class="px-6 py-4 border-t border-[#D6E0F0] bg-[#F4F7FC] flex justify-between items-center">
            <span class="text-[11px] text-[#8A9DC0]">{{ policies.length }} políticas registradas</span>
            <button (click)="close()"
                class="px-4 py-2 text-[12px] font-semibold rounded-xl border border-[#D6E0F0] bg-white text-[#4A6A9B] cursor-pointer hover:bg-[#F0F4FA] transition">
                Cerrar
            </button>
        </div>

    </div>
</div>
