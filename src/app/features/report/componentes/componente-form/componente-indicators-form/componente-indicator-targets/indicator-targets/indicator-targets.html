<div [formGroup]="indicatorGroup" class="rounded-2xl border border-[#D6E0F0] bg-white shadow-sm overflow-hidden">

    <!-- TOP BAR -->
    <div class="h-[3px] bg-gradient-to-r from-[#1B3A6B] via-[#2d5fa8] to-[#1B3A6B]"></div>

    <!-- HEADER -->
    <div class="flex items-center justify-between px-4 py-3 border-b border-[#D6E0F0] bg-[#F4F7FC]">

        <div>
            <label class="text-[10px] font-bold uppercase tracking-[1px] text-[#1B3A6B]">
                Metas anuales
            </label>

            <p *ngIf="showGroupedNote" class="text-[10.5px] text-[#7C94BD] mt-0.5">
                La meta aplica al total consolidado de todos los grupos
            </p>
        </div>

        <button type="button" (click)="addTarget()" class="flex items-center gap-1 px-3 py-1.5 rounded-lg text-[11px] font-semibold
      border border-[#D6E0F0] bg-white text-[#1B3A6B]
      hover:bg-[#F0F4FA] hover:border-[#2d5fa8]
      transition-all cursor-pointer">

            Agregar meta

        </button>

    </div>

    <!-- CONTENT -->
    <div class="p-4 space-y-2" formArrayName="targets">

        <div *ngFor="let t of targets.controls; let j = index" [formGroupName]="j" class="flex items-center gap-2">

            <!-- YEAR -->
            <input type="number" formControlName="year" class="w-24 text-[13px] rounded-xl px-3 py-2
        bg-[#F0F4FA] border border-[#D6E0F0]
        focus:bg-white focus:border-[#2d5fa8]
        focus:ring-2 focus:ring-[#2d5fa8]/20
        outline-none transition-all" placeholder="Año" />

            <!-- TARGET -->
            <input type="number" formControlName="target_value" step="0.01" class="flex-1 text-[13px] rounded-xl px-3 py-2
        bg-[#F0F4FA] border border-[#D6E0F0]
        focus:bg-white focus:border-[#2d5fa8]
        focus:ring-2 focus:ring-[#2d5fa8]/20
        outline-none transition-all" placeholder="Meta (número positivo)" />

            <!-- DELETE -->
            <button type="button" (click)="removeTarget(j)"
                class="p-2 text-red-600 hover:bg-red-50 rounded-xl transition cursor-pointer" title="Eliminar meta">

                <lucide-icon name="trash-2" [size]="16" [strokeWidth]="2" color="currentColor"></lucide-icon>

            </button>

        </div>

        <!-- EMPTY -->
        <div *ngIf="targets.length === 0" class="text-[11px] text-[#8A9DC0] text-center py-4">

            No hay metas definidas. Opcionales para datos agrupados.

        </div>

    </div>

</div>
