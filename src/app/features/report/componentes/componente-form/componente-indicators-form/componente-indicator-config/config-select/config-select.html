<div [formGroup]="indicatorGroup" class="bg-zinc-50 border border-zinc-200 rounded-lg p-4 space-y-2">
    <label class="block text-xs font-medium text-zinc-700">
        {{ isMulti ? 'Opciones (selección múltiple)' : 'Opciones' }} *
    </label>
    <textarea formControlName="configOptions" (blur)="sanitizeOptionsOnBlur()" rows="3"
        class="w-full px-3 py-2 text-sm border border-zinc-200 rounded-lg bg-white text-zinc-900 resize-none uppercase focus:outline-none focus:border-zinc-900 focus:ring-1 focus:ring-zinc-900 transition-colors duration-150"
        [placeholder]="isMulti ? 'GATO\nPERRO\nCONEJO\nAVE' : 'OPCIÓN 1\nOPCIÓN 2\nOPCIÓN 3'">
  </textarea>
    <p class="text-xs text-zinc-500">
        {{ isMulti
        ? 'Selección múltiple. Auto-formato al salir del campo: MAYÚSCULAS, sin duplicados'
        : 'Cada línea = una opción. Auto-formato al salir del campo: MAYÚSCULAS, sin espacios extras' }}
    </p>
</div>
