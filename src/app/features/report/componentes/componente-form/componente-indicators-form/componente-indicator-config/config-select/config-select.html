<div [formGroup]="indicatorGroup" class="rounded-2xl border border-[#D6E0F0] bg-white shadow-sm overflow-hidden">

    <!-- TOP BAR -->
    <div class="h-[4px] bg-gradient-to-r from-[#1B3A6B] via-[#2d5fa8] to-[#1B3A6B]"></div>

    <div class="p-5 space-y-3">

        <label class="text-[10px] font-bold uppercase tracking-[1px] text-[#4A6A9B]">
            {{ isMulti ? 'Opciones (selección múltiple)' : 'Opciones' }} *
        </label>

        <textarea formControlName="configOptions" (blur)="sanitizeOptionsOnBlur()" rows="3" class="w-full text-[13px] rounded-xl px-3 py-2.5 resize-none uppercase
      bg-[#F0F4FA] border border-[#D6E0F0]
      focus:bg-white focus:border-[#2d5fa8]
      focus:ring-2 focus:ring-[#2d5fa8]/20
      outline-none transition-all"
            [placeholder]="isMulti ? 'GATO\nPERRO\nCONEJO\nAVE' : 'OPCIÓN 1\nOPCIÓN 2\nOPCIÓN 3'">
    </textarea>

        <p class="text-[10.5px] text-[#8A9DC0]">
            {{
            isMulti
            ? 'Selección múltiple. Auto-formato al salir del campo: MAYÚSCULAS, sin duplicados'
            : 'Cada línea = una opción. Auto-formato al salir del campo: MAYÚSCULAS, sin espacios extras'
            }}
        </p>

    </div>

</div>
