<div [formGroup]="indicatorGroup" class="rounded-2xl border border-[#D6E0F0] bg-white shadow-sm overflow-hidden">

    <!-- TOP BAR -->
    <div class="h-[4px] bg-gradient-to-r from-[#1B3A6B] via-[#2d5fa8] to-[#1B3A6B]"></div>

    <div class="p-5 space-y-3">

        <label class="text-[10px] font-bold uppercase tracking-[1px] text-[#4A6A9B]">
            Campos del grupo *
        </label>

        <textarea formControlName="configFields" (blur)="sanitizeFieldsOnBlur()" rows="3" class="w-full text-[13px] rounded-xl px-3 py-2.5 resize-none
      bg-[#F0F4FA] border border-[#D6E0F0]
      focus:bg-white focus:border-[#2d5fa8]
      focus:ring-2 focus:ring-[#2d5fa8]/20
      outline-none transition-all" placeholder="Hombres&#10;Mujeres&#10;Niños&#10;Adulto Mayor">
    </textarea>

        <p class="text-[10.5px] text-[#8A9DC0]">
            Auto-formato al salir del campo: Primera letra mayúscula. El sistema sumará automáticamente.
        </p>

    </div>

</div>
