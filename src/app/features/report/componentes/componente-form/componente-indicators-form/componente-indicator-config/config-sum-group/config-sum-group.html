<div [formGroup]="indicatorGroup" class="bg-zinc-50 border border-zinc-200 rounded-lg p-4 space-y-2">
    <label class="block text-xs font-medium text-zinc-700">Campos del grupo *</label>
    <textarea formControlName="configFields" (blur)="sanitizeFieldsOnBlur()" rows="3"
        class="w-full px-3 py-2 text-sm border border-zinc-200 rounded-lg bg-white text-zinc-900 resize-none focus:outline-none focus:border-zinc-900 focus:ring-1 focus:ring-zinc-900 transition-colors duration-150"
        placeholder="Hombres&#10;Mujeres&#10;Niños&#10;Adulto Mayor">
  </textarea>
    <p class="text-xs text-zinc-500">
        Auto-formato al salir del campo: Primera Letra Mayúscula. El sistema sumará automáticamente
    </p>
</div>
