<div [formGroup]="indicatorGroup" class="rounded-2xl border border-[#D6E0F0] bg-white shadow-sm overflow-hidden">

    <!-- TOP BAR -->
    <div class="h-[4px] bg-gradient-to-r from-[#6B7280] via-[#9CA3AF] to-[#6B7280]"></div>

    <div class="p-5 space-y-5">

        <!-- INFO -->
        <div class="flex items-start gap-3">

            <div class="w-8 h-8 rounded-xl flex items-center justify-center bg-[#EEF2F7] flex-shrink-0">
                <lucide-icon name="paperclip" [size]="16" [strokeWidth]="2" color="currentColor" class="text-[#4B5563]"></lucide-icon>
            </div>

            <div>
                <p class="text-[11px] font-bold uppercase tracking-[1px] text-[#374151]">
                    Archivo adjunto
                </p>

                <p class="text-[11px] text-[#6B7280] mt-0.5 max-w-xl">
                    El usuario podrá subir un archivo al diligenciar el reporte.
                    Puedes restringir los tipos de archivo permitidos.
                </p>
            </div>

        </div>

        <!-- FILE TYPES -->
        <div class="space-y-1.5">

            <label class="text-[10px] font-bold uppercase tracking-[1px] text-[#4A6A9B]">
                Tipos de archivo permitidos
            </label>

            <input type="text" formControlName="configAllowedTypes" placeholder="pdf, docx, xlsx, jpg  (vacío = todos)"
                class="w-full text-[13px] rounded-xl px-3 py-2.5 lowercase
        bg-[#F0F4FA] border border-[#D6E0F0]
        focus:bg-white focus:border-[#2d5fa8]
        focus:ring-2 focus:ring-[#2d5fa8]/20
        outline-none transition-all" />

            <p class="text-[10.5px] text-[#8A9DC0]">
                Separa con comas. Extensiones válidas: pdf, doc, docx, xls, xlsx,
                png, jpg, jpeg, gif, txt, csv, zip
            </p>

        </div>

        <!-- FILE SIZE -->
        <div class="space-y-1.5">

            <label class="text-[10px] font-bold uppercase tracking-[1px] text-[#4A6A9B]">
                Tamaño máximo (MB)
            </label>

            <input type="number" formControlName="configMaxSizeMb" min="1" max="50" placeholder="10" class="w-32 text-[13px] rounded-xl px-3 py-2.5
        bg-[#F0F4FA] border border-[#D6E0F0]
        focus:bg-white focus:border-[#2d5fa8]
        focus:ring-2 focus:ring-[#2d5fa8]/20
        outline-none transition-all" />

            <p class="text-[10.5px] text-[#8A9DC0]">
                Vacío = sin límite (el servidor limita a 10 MB por defecto)
            </p>

        </div>

    </div>

</div>
