<div class="min-h-screen" style="background:#F8FAFC;font-family:'DM Sans',sans-serif;">

    <!-- HEADER -->
    <div class="sticky top-0 z-20" style="background:#F8FAFC;border-bottom:1px solid #E2E8F0;">
        <div class="px-4 sm:px-6">

            <!-- BREADCRUMB -->
            <div class="flex items-center gap-1.5 pt-2.5" style="opacity:0.5;">
                <svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="#1B3A6B" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V7M4 7c0-2 1-3 3-3h10c2 0 3 1 3 3M4 7h16" />
                </svg>
                <span class="text-[11px]" style="color:#1B3A6B;">Bases de datos</span>
                <span class="text-[11px]" style="color:#1B3A6B;">›</span>
                <span class="text-[11px] truncate" style="color:#1B3A6B;max-width:260px;">
                    {{ datasetName() || '...' }}
                </span>
            </div>

            <!-- MAIN ROW -->
            <div class="flex items-center justify-between gap-3 py-3">

                <div class="flex items-center gap-2 min-w-0">

                    <button (click)="goBack()"
                        class="w-8 h-8 rounded-lg flex items-center justify-center cursor-pointer shrink-0 transition-all"
                        style="background:#E8EDF5;" onmouseover="this.style.background='#D6E0F0'"
                        onmouseout="this.style.background='#E8EDF5'">
                        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="#1B3A6B" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                        </svg>
                    </button>

                    <div class="w-9 h-9 rounded-xl flex items-center justify-center shrink-0"
                        style="background:#1B3A6B;">
                        <svg width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="1.8">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V7M4 7c0-2 1-3 3-3h10c2 0 3 1 3 3M4 7h16" />
                        </svg>
                    </div>

                    <div class="min-w-0">
                        <h1 class="font-bold leading-tight truncate"
                            style="font-size:clamp(14px,2vw,19px);letter-spacing:-0.01em;color:#1B3A6B;">
                            {{ (datasetName() || data()?.table?.name || 'Dashboard') | uppercase }}
                        </h1>
                        <p class="text-[12px] mt-0.5 truncate" style="color:#8A9DC0;" *ngIf="data()">
                            {{ data()!.total | number }} registros
                        </p>
                    </div>

                </div>

                <!-- TABS -->
                <div class="flex items-center shrink-0" style="background:#E8EDF5;padding:3px;border-radius:10px;">
                    <button (click)="setTab('dashboard')"
                        class="px-4 py-1.5 rounded-lg text-[13px] font-bold cursor-pointer transition-all whitespace-nowrap"
                        [style.background]="activeTab() === 'dashboard' ? '#1B3A6B' : 'transparent'"
                        [style.color]="activeTab() === 'dashboard' ? 'white' : '#4A6A9B'">
                        Dashboard
                    </button>
                    <button (click)="setTab('records')"
                        class="px-4 py-1.5 rounded-lg text-[13px] font-bold cursor-pointer transition-all whitespace-nowrap"
                        [style.background]="activeTab() === 'records' ? '#1B3A6B' : 'transparent'"
                        [style.color]="activeTab() === 'records' ? 'white' : '#4A6A9B'">
                        Registros
                    </button>
                </div>

            </div>

        </div>
    </div>

    <!-- LOADING -->
    <div *ngIf="loading()" class="flex flex-col items-center justify-center py-48">
        <div class="w-10 h-10 rounded-full animate-spin mb-5"
            style="border:3px solid #E2E8F0;border-top-color:#2563EB;"></div>
        <p class="text-[13px] font-medium" style="color:#94A3B8;">Analizando dataset...</p>
    </div>

    <!-- ERROR -->
    <div *ngIf="!loading() && error()" class="px-4 sm:px-6 py-20 text-center">
        <p class="text-sm font-semibold" style="color:#EF4444;">{{ error() }}</p>
    </div>

    <!-- CONTENT -->
    <ng-container *ngIf="!loading() && !error() && data()">

        <!-- TAB: DASHBOARD -->
        <ng-container *ngIf="activeTab() === 'dashboard'">
            <app-personas-capacitadas-view
                *ngIf="data()!.dataset_type === 'personas_capacitadas'"
                [data]="data()!" />
            <app-presupuesto-view
                *ngIf="data()!.dataset_type === 'presupuesto'"
                [data]="data()!" />
            <app-generico-view
                *ngIf="data()!.dataset_type !== 'personas_capacitadas' && data()!.dataset_type !== 'presupuesto'"
                [data]="data()!" />
        </ng-container>

        <!-- TAB: REGISTROS -->
        <div *ngIf="activeTab() === 'records'" class="px-4 sm:px-6 py-8">
            <dashboard-records [tableId]="tableId" [datasetType]="data()!.dataset_type" />
        </div>

    </ng-container>

</div>
