<div class="max-w-7xl mx-auto px-6 py-6 pb-12">

    <!-- NO DATASETS -->
    <div *ngIf="!hasDatasets" class="bg-white border border-zinc-200 rounded-2xl p-12">
        <div class="flex flex-col items-center gap-2">
            <div class="w-10 h-10 rounded-xl bg-zinc-100 flex items-center justify-center mb-1">
                <svg class="w-5 h-5 text-zinc-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M3 10h18M3 14h18M10 3v18M14 3v18" />
                </svg>
            </div>
            <p class="text-sm font-semibold text-zinc-900">No hay tablas aún</p>
            <p class="text-xs text-zinc-500">Importa un dataset para ver sus tablas aquí</p>
        </div>
    </div>

    <ng-container *ngIf="hasDatasets">

        <!-- FILTERS -->
        <div class="flex flex-wrap items-end gap-3 mb-6">

            <div class="flex-1 min-w-[240px]">
                <label class="block text-[10px] font-medium text-zinc-500 uppercase tracking-wide mb-1">Buscar</label>
                <div class="relative">
                    <svg class="absolute left-3 top-2.5 w-4 h-4 text-zinc-400 pointer-events-none" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <input type="text" placeholder="Nombre de tabla..." [value]="search()"
                        (input)="search.set($any($event.target).value)" class="w-full pl-9 pr-4 py-2 text-sm bg-white border border-zinc-200 rounded-lg
                   text-zinc-900 placeholder:text-zinc-400
                   focus:outline-none focus:border-zinc-900 focus:ring-1 focus:ring-zinc-900
                   transition-colors duration-150" />
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-medium text-zinc-500 uppercase tracking-wide mb-1">Orden</label>
                <select [value]="sortBy()" (change)="sortBy.set($any($event.target).value)" class="px-3 py-2 text-sm bg-white border border-zinc-200 rounded-lg text-zinc-900
                 focus:outline-none focus:border-zinc-900 focus:ring-1 focus:ring-zinc-900
                 transition-colors duration-150 cursor-pointer">
                    <option value="name">Nombre</option>
                    <option value="records">Más registros</option>
                    <option value="fields">Más campos</option>
                </select>
            </div>

            <div>
                <label class="block text-[10px] font-medium text-zinc-500 uppercase tracking-wide mb-1">Tipo de
                    campo</label>
                <select [value]="fieldTypeFilter()" (change)="fieldTypeFilter.set($any($event.target).value || null)"
                    class="px-3 py-2 text-sm bg-white border border-zinc-200 rounded-lg text-zinc-900
                 focus:outline-none focus:border-zinc-900 focus:ring-1 focus:ring-zinc-900
                 transition-colors duration-150 cursor-pointer">
                    <option value="">Todos</option>
                    <option value="text">Text</option>
                    <option value="number">Number</option>
                    <option value="date">Date</option>
                    <option value="boolean">Boolean</option>
                    <option value="select">Select</option>
                </select>
            </div>

            <button (click)="clearFilters()" [disabled]="!search() && !fieldTypeFilter() && sortBy() === 'name'" class="px-3 py-2 text-sm font-medium text-zinc-500 bg-white border border-zinc-200 rounded-lg
               hover:bg-zinc-50 hover:text-zinc-900 transition-colors duration-150
               disabled:opacity-40 disabled:cursor-not-allowed cursor-pointer">
                Limpiar
            </button>

        </div>

        <!-- LOADING -->
        <div *ngIf="loading()" class="bg-white border border-zinc-200 rounded-2xl p-12">
            <div class="flex flex-col items-center gap-3">
                <div class="w-5 h-5 border-2 border-zinc-300 border-t-zinc-900 rounded-full animate-spin"></div>
                <p class="text-sm text-zinc-500">Cargando tablas...</p>
            </div>
        </div>

        <!-- CARDS GRID -->
        <div *ngIf="!loading() && filteredTables().length"
            class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">

            <div *ngFor="let stat of filteredTables()" (click)="goToRecords(stat.table)" class="bg-white border border-zinc-200 rounded-2xl p-5
               hover:border-zinc-300 hover:shadow-md hover:-translate-y-0.5
               transition-all duration-200 cursor-pointer group">

                <div class="flex items-start justify-between gap-2 mb-5">
                    <div class="min-w-0">
                        <h3 class="text-sm font-semibold text-zinc-900 group-hover:text-black
                       transition-colors leading-snug truncate">
                            {{ stat.table.name }}
                        </h3>
                        <span class="flex items-center gap-1 mt-1 text-[11px] text-zinc-400 w-full overflow-hidden">
                            <svg class="w-3 h-3 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V7M4 7c0-2 1-3 3-3h10c2 0 3 1 3 3M4 7h16" />
                            </svg>
                            <span class="truncate min-w-0">{{ stat.datasetName }}</span>
                        </span>
                    </div>
                    <svg class="w-4 h-4 text-zinc-300 group-hover:text-zinc-500 shrink-0 mt-0.5 transition-colors"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>
                </div>

                <div class="grid grid-cols-2 gap-2.5 mb-4 pb-4 border-b border-zinc-100">
                    <div class="bg-zinc-50 rounded-xl px-3 py-2.5">
                        <div class="text-xl font-semibold text-zinc-900 tabular-nums">{{ stat.recordsCount }}</div>
                        <div class="text-[11px] text-zinc-500 mt-0.5">Registros</div>
                    </div>
                    <div class="bg-zinc-50 rounded-xl px-3 py-2.5">
                        <div class="text-xl font-semibold text-zinc-900 tabular-nums">{{ stat.fieldsCount }}</div>
                        <div class="text-[11px] text-zinc-500 mt-0.5">Campos</div>
                    </div>
                </div>

                <div class="flex flex-wrap gap-1.5">
                    <span *ngFor="let type of stat.fieldTypes" class="px-2 py-0.5 rounded-md text-[10px] font-medium uppercase tracking-wide
                   bg-zinc-100 text-zinc-600">
                        {{ type }}
                    </span>
                </div>

            </div>
        </div>

        <!-- EMPTY (filters) -->
        <div *ngIf="!loading() && !filteredTables().length" class="bg-white border border-zinc-200 rounded-2xl p-12">
            <div class="flex flex-col items-center gap-2">
                <div class="w-10 h-10 rounded-xl bg-zinc-100 flex items-center justify-center mb-1">
                    <svg class="w-5 h-5 text-zinc-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M3 10h18M3 14h18M10 3v18M14 3v18" />
                    </svg>
                </div>
                <p class="text-sm font-semibold text-zinc-900">Sin resultados</p>
                <p class="text-xs text-zinc-500">No se encontraron tablas con los filtros aplicados</p>
            </div>
        </div>

    </ng-container>

</div>
