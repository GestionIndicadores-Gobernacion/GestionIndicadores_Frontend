<div class="fixed inset-0 bg-black/30 backdrop-blur-sm z-50 flex items-center justify-center p-4"
    (click)="closeModal()">
    <div class="bg-white rounded-2xl shadow-xl max-w-md w-full border p-6 space-y-5" style="border-color:#D6E0F0"
        (click)="$event.stopPropagation()">

        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-xl flex items-center justify-center"
                style="background:linear-gradient(135deg,#1B3A6B,#2d5fa8)">
                <lucide-icon name="upload" [size]="16" class="text-white" [strokeWidth]="2"></lucide-icon>
            </div>
            <div>
                <h2 class="text-[15px] font-bold" style="color:#1B3A6B">Actualizar dataset</h2>
                <p class="text-[12px]" style="color:#4A6A9B">{{ dataset.name }}</p>
            </div>
        </div>

        <p class="text-[12px]" style="color:#4A6A9B">
            Se reemplazarán todos los registros actuales con los del nuevo archivo Excel.
            Los indicadores vinculados a este dataset no se verán afectados.
        </p>

        <label
            class="flex flex-col items-center gap-3 px-6 py-8 border-2 border-dashed rounded-2xl cursor-pointer transition"
            style="border-color:#D6E0F0;background:#F8FAFD">
            <lucide-icon name="upload" [size]="40" color="#4A6A9B" [strokeWidth]="2"></lucide-icon>
            <span class="text-[13px] font-semibold" style="color:#1B3A6B">
                {{ selectedFile ? selectedFile.name : 'Seleccionar archivo Excel' }}
            </span>
            <input type="file" accept=".xlsx,.xls" (change)="onFile($event)" class="hidden" />
        </label>

        <div class="flex justify-end gap-2">
            <button (click)="closeModal()" [disabled]="uploading" class="px-4 py-2 text-sm cursor-pointer"
                style="color:#4A6A9B">
                Cancelar
            </button>
            <button (click)="upload()" [disabled]="!selectedFile || uploading"
                class="px-4 py-2 text-sm font-bold rounded-xl text-white cursor-pointer disabled:opacity-50"
                style="background:linear-gradient(135deg,#1B3A6B,#2d5fa8)">
                {{ uploading ? 'Actualizando...' : 'Actualizar' }}
            </button>
        </div>

    </div>
</div>
