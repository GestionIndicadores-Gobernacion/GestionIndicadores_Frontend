<!-- BACKDROP -->
<div class="fixed inset-0 bg-black/30 backdrop-blur-sm z-50 flex items-center justify-center p-4"
    (click)="closeModal()">

    <!-- MODAL -->
    <div class="bg-white rounded-2xl shadow-xl max-w-3xl w-full max-h-[90vh] flex flex-col border"
        style="border-color:#D6E0F0" (click)="$event.stopPropagation()">

        <!-- HEADER -->
        <div class="px-6 py-5 border-b" style="border-color:#D6E0F0">

            <div class="flex items-center gap-3">

                <div class="w-9 h-9 rounded-xl flex items-center justify-center"
                    style="background:linear-gradient(135deg,#1B3A6B,#2d5fa8)">

                    <lucide-icon name="upload" [size]="16" class="text-white" [strokeWidth]="2"></lucide-icon>

                </div>

                <h2 class="text-[15px] font-bold" style="color:#1B3A6B">
                    Importar dataset desde Excel
                </h2>

            </div>


            <!-- STEPS -->
            <div class="flex items-center gap-2 mt-5 text-[11px]">

                <!-- STEP 1 -->
                <div class="flex items-center gap-2 flex-1">

                    <div class="w-7 h-7 rounded-full flex items-center justify-center font-bold"
                        [style.background]="step >= 1 ? '#1B3A6B' : '#F0F4FA'"
                        [style.color]="step >= 1 ? 'white' : '#4A6A9B'">
                        1
                    </div>

                    <span [style.color]="step === 1 ? '#1B3A6B' : '#8A9DC0'" [class.font-bold]="step === 1">
                        Archivo
                    </span>

                    <div class="flex-1 h-[2px]" style="background:#D6E0F0"></div>

                </div>


                <!-- STEP 2 -->
                <div class="flex items-center gap-2 flex-1">

                    <div class="w-7 h-7 rounded-full flex items-center justify-center font-bold"
                        [style.background]="step >= 2 ? '#1B3A6B' : '#F0F4FA'"
                        [style.color]="step >= 2 ? 'white' : '#4A6A9B'">
                        2
                    </div>

                    <span [style.color]="step === 2 ? '#1B3A6B' : '#8A9DC0'" [class.font-bold]="step === 2">
                        Preview
                    </span>

                    <div class="flex-1 h-[2px]" style="background:#D6E0F0"></div>

                </div>


                <!-- STEP 3 -->
                <div class="flex items-center gap-2 flex-1">

                    <div class="w-7 h-7 rounded-full flex items-center justify-center font-bold"
                        [style.background]="step >= 3 ? '#1B3A6B' : '#F0F4FA'"
                        [style.color]="step >= 3 ? 'white' : '#4A6A9B'">
                        3
                    </div>

                    <span [style.color]="step === 3 ? '#1B3A6B' : '#8A9DC0'" [class.font-bold]="step === 3">
                        Campos
                    </span>

                    <div class="flex-1 h-[2px]" style="background:#D6E0F0"></div>

                </div>


                <!-- STEP 4 -->
                <div class="flex items-center gap-2">

                    <div class="w-7 h-7 rounded-full flex items-center justify-center font-bold"
                        [style.background]="step >= 4 ? '#1B3A6B' : '#F0F4FA'"
                        [style.color]="step >= 4 ? 'white' : '#4A6A9B'">
                        4
                    </div>

                    <span [style.color]="step === 4 ? '#1B3A6B' : '#8A9DC0'" [class.font-bold]="step === 4">
                        Importar
                    </span>

                </div>

            </div>

        </div>



        <!-- BODY -->
        <div class="flex-1 overflow-y-auto p-6">

            <!-- STEP 1 -->
            <div *ngIf="step === 1" class="flex flex-col items-center justify-center py-12">

                <div class="w-full max-w-md">

                    <label
                        class="flex flex-col items-center gap-4 px-6 py-12 border-2 border-dashed rounded-2xl cursor-pointer transition"
                        style="border-color:#D6E0F0;background:#F8FAFD">

                        <lucide-icon name="upload" [size]="48" color="#4A6A9B" [strokeWidth]="2"></lucide-icon>

                        <div class="text-center">

                            <p class="text-sm font-bold" style="color:#1B3A6B">
                                Haz clic para seleccionar un archivo
                            </p>

                            <p class="text-xs mt-1" style="color:#4A6A9B">
                                o arrastra y suelta aquí
                            </p>

                            <p class="text-xs mt-2" style="color:#8A9DC0">
                                Formatos: .xlsx, .xls
                            </p>

                        </div>

                        <input type="file" accept=".xlsx,.xls" (change)="onFile($event)" class="hidden" />

                    </label>

                </div>

            </div>



            <!-- STEP 2 PREVIEW -->
            <div *ngIf="step === 2" class="space-y-6">

                <div *ngFor="let sheet of preview; let i = index" class="border rounded-xl overflow-hidden"
                    style="border-color:#D6E0F0">

                    <div class="flex items-center justify-between px-4 py-3" style="background:#F8FAFD">

                        <p class="text-sm font-bold" style="color:#1B3A6B">
                            {{ sheet.sheet_name }}
                        </p>

                        <button (click)="removeSheet(i)" class="text-xs px-3 py-1 rounded-lg cursor-pointer"
                            style="background:#EEF2F9;color:#1B3A6B">
                            Excluir hoja
                        </button>

                    </div>


                    <table class="w-full text-sm">

                        <thead style="background:#F0F4FA">

                            <tr>
                                <th class="px-4 py-2 text-left text-xs" style="color:#4A6A9B">
                                    Campo
                                </th>

                                <th class="px-4 py-2 text-left text-xs" style="color:#4A6A9B">
                                    Tipo
                                </th>
                            </tr>

                        </thead>

                        <tbody>

                            <tr *ngFor="let field of sheet.fields" class="border-t" style="border-color:#EEF2F9">

                                <td class="px-4 py-2 text-sm break-all" style="color:#1B3A6B">
                                    {{ field.field_name }}
                                </td>

                                <td class="px-4 py-2 text-sm">

                                    <span class="px-2 py-0.5 rounded text-xs" style="background:#EEF2F9;color:#4A6A9B">

                                        {{ field.type }}

                                    </span>

                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>



            <!-- STEP 3 CAMPOS -->
            <div *ngIf="step === 3" class="space-y-6">

                <div *ngFor="let sheet of preview; let i = index">

                    <p class="text-sm font-bold mb-2" style="color:#1B3A6B">
                        {{ sheet.sheet_name }}
                    </p>

                    <div class="space-y-2">

                        <div *ngFor="let field of sheet.fields" class="flex items-center gap-3 p-3 rounded-xl border"
                            style="border-color:#D6E0F0" [class.opacity-50]="!field.selected">

                            <input type="checkbox" [(ngModel)]="field.selected">

                            <input type="text" [(ngModel)]="field.field_name" [disabled]="!field.selected"
                                class="flex-1 px-3 py-1.5 text-sm rounded-lg border"
                                style="border-color:#D6E0F0;background:#F8FAFD">

                            <select [(ngModel)]="field.type" [disabled]="!field.selected"
                                class="px-3 py-1.5 text-sm rounded-lg border"
                                style="border-color:#D6E0F0;background:#F8FAFD">

                                <option value="text">Texto</option>
                                <option value="number">Número</option>
                                <option value="date">Fecha</option>
                                <option value="boolean">Booleano</option>

                            </select>

                        </div>

                    </div>

                </div>

            </div>



            <!-- STEP 4 IMPORT -->
            <div *ngIf="step === 4" class="flex flex-col items-center justify-center py-12">

                <div class="w-full max-w-md space-y-4 text-center">

                    <div class="w-12 h-12 mx-auto mb-4 border-2 rounded-full animate-spin"
                        style="border-color:#D6E0F0;border-top-color:#1B3A6B"></div>

                    <p class="text-sm" style="color:#4A6A9B">
                        Importando dataset...
                    </p>

                    <div class="w-full rounded-full h-2 overflow-hidden" style="background:#EEF2F9">

                        <div class="h-full transition-all duration-300"
                            style="background:linear-gradient(135deg,#1B3A6B,#2d5fa8)" [style.width.%]="progress">
                        </div>

                    </div>

                    <p class="text-xs" style="color:#8A9DC0">
                        {{ progress }}% completado
                    </p>

                </div>

            </div>

        </div>



        <!-- FOOTER -->
        <div class="px-6 py-4 border-t flex items-center justify-between" style="border-color:#D6E0F0">

            <button (click)="prev()" [disabled]="step === 1 || importing"
                class="px-4 py-2 text-sm font-medium cursor-pointer" style="color:#4A6A9B">

                ← Atrás

            </button>

            <div class="flex items-center gap-2">

                <button (click)="closeModal()" [disabled]="importing"
                    class="px-4 py-2 text-sm font-medium cursor-pointer" style="color:#4A6A9B">

                    Cancelar

                </button>


                <button *ngIf="step < 3" (click)="next()" [disabled]="preview.length === 0"
                    class="px-4 py-2 text-sm font-bold rounded-xl text-white cursor-pointer"
                    style="background:linear-gradient(135deg,#1B3A6B,#2d5fa8)">

                    Siguiente →

                </button>


                <button *ngIf="step === 3" (click)="import()" [disabled]="importing || preview.length === 0"
                    class="px-4 py-2 text-sm font-bold rounded-xl text-white cursor-pointer"
                    style="background:linear-gradient(135deg,#1B3A6B,#2d5fa8)">

                    Importar

                </button>

            </div>

        </div>

    </div>

</div>
