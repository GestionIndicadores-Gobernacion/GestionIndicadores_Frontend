<div *ngIf="isOpen()" class="fixed inset-0 z-50 flex">

    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/30 backdrop-blur-sm" (click)="close()"></div>

    <!-- Drawer Panel -->
    <div class="relative ml-auto w-full max-w-xl h-full bg-white shadow-2xl flex flex-col overflow-hidden">

        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-5 border-b border-zinc-200 shrink-0">
            <div>
                <h2 class="text-base font-semibold text-zinc-900">Editar tabla</h2>
                <p class="text-xs text-zinc-500 mt-0.5">Estructura y configuración</p>
            </div>
            <button (click)="close()"
                class="p-2 text-zinc-400 hover:text-zinc-700 hover:bg-zinc-100 rounded-lg transition-colors cursor-pointer">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Tabs -->
        <div class="flex border-b border-zinc-200 shrink-0 px-6">
            <button *ngFor="let tab of tabs" (click)="activeTab.set(tab.id)" [ngClass]="activeTab() === tab.id
          ? 'border-zinc-900 text-zinc-900 font-semibold'
          : 'border-transparent text-zinc-500 hover:text-zinc-700'"
                class="px-1 py-3 mr-6 text-sm border-b-2 -mb-px transition-colors duration-150 cursor-pointer">
                {{ tab.label }}
            </button>
        </div>

        <!-- Scrollable content -->
        <div class="flex-1 overflow-y-auto px-6 py-6">

            <!-- ─── TAB: TABLE ─── -->
            <ng-container *ngIf="activeTab() === 'table'">
                <div class="space-y-5">

                    <div>
                        <label class="block text-xs font-medium text-zinc-700 mb-1.5">Nombre de la tabla</label>
                        <input type="text" [(ngModel)]="tableName" placeholder="Nombre..." class="w-full px-3 py-2 text-sm border border-zinc-200 rounded-lg bg-white text-zinc-900
                     focus:outline-none focus:border-zinc-900 focus:ring-1 focus:ring-zinc-900 transition-colors" />
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-zinc-700 mb-1.5">Descripción (opcional)</label>
                        <textarea [(ngModel)]="tableDescription" rows="3" placeholder="Descripción breve..."
                            class="w-full px-3 py-2 text-sm border border-zinc-200 rounded-lg bg-white text-zinc-900 resize-none
                     focus:outline-none focus:border-zinc-900 focus:ring-1 focus:ring-zinc-900 transition-colors"></textarea>
                    </div>

                    <div class="pt-2">
                        <button (click)="saveTableMeta()" [disabled]="savingTable()" class="w-full py-2.5 text-sm font-medium text-white bg-zinc-900 rounded-lg
                     hover:bg-zinc-700 disabled:opacity-50 transition-colors cursor-pointer">
                            {{ savingTable() ? 'Guardando...' : 'Guardar nombre' }}
                        </button>
                    </div>

                </div>
            </ng-container>

            <!-- ─── TAB: FIELDS ─── -->
            <ng-container *ngIf="activeTab() === 'fields'">
                <div class="space-y-3">

                    <!-- Existing fields -->
                    <div *ngFor="let field of editableFields(); let i = index"
                        class="border border-zinc-200 rounded-xl p-4 space-y-3 bg-zinc-50/50">
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-semibold text-zinc-500 uppercase tracking-wider">Campo {{ i + 1
                                }}</span>
                            <button (click)="removeField(i)"
                                class="p-1 text-red-400 hover:text-red-600 hover:bg-red-50 rounded transition-colors cursor-pointer"
                                title="Eliminar campo">
                                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M6 18L18 6M6 6l12 12" />
                                </svg>
                            </button>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs text-zinc-600 mb-1">Etiqueta</label>
                                <input type="text" [(ngModel)]="field.label" (ngModelChange)="onLabelChange(field)"
                                    placeholder="Etiqueta visible"
                                    class="w-full px-2.5 py-1.5 text-xs border border-zinc-200 rounded-lg bg-white
                         focus:outline-none focus:border-zinc-900 focus:ring-1 focus:ring-zinc-900 transition-colors" />
                            </div>
                            <div>
                                <label class="block text-xs text-zinc-600 mb-1">Nombre (clave)</label>
                                <input type="text" [(ngModel)]="field.name" placeholder="nombre_campo"
                                    class="w-full px-2.5 py-1.5 text-xs border border-zinc-200 rounded-lg bg-white font-mono
                         focus:outline-none focus:border-zinc-900 focus:ring-1 focus:ring-zinc-900 transition-colors" />
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs text-zinc-600 mb-1">Tipo</label>
                            <select [(ngModel)]="field.type"
                                class="w-full px-2.5 py-1.5 text-xs border border-zinc-200 rounded-lg bg-white
                       focus:outline-none focus:border-zinc-900 focus:ring-1 focus:ring-zinc-900 transition-colors cursor-pointer">
                                <option value="text">Texto</option>
                                <option value="number">Número</option>
                                <option value="date">Fecha</option>
                                <option value="boolean">Booleano</option>
                                <option value="select">Selección</option>
                            </select>
                        </div>

                        <!-- Options (only for select type) -->
                        <div *ngIf="field.type === 'select'" class="space-y-2">
                            <label class="block text-xs text-zinc-600">Opciones</label>
                            <div class="flex flex-wrap gap-1.5">
                                <span *ngFor="let opt of field.options; let oi = index"
                                    class="inline-flex items-center gap-1 px-2 py-0.5 bg-zinc-100 text-zinc-700 text-xs rounded-md">
                                    {{ opt }}
                                    <button (click)="removeOption(field, oi)"
                                        class="text-zinc-400 hover:text-zinc-700 cursor-pointer">×</button>
                                </span>
                            </div>
                            <div class="flex gap-2">
                                <input type="text" [(ngModel)]="newOptionInputs[i]" placeholder="Nueva opción..."
                                    (keyup.enter)="addOption(field, i)"
                                    class="flex-1 px-2.5 py-1.5 text-xs border border-zinc-200 rounded-lg bg-white
                         focus:outline-none focus:border-zinc-900 focus:ring-1 focus:ring-zinc-900 transition-colors" />
                                <button (click)="addOption(field, i)" class="px-3 py-1.5 text-xs font-medium text-zinc-700 bg-white border border-zinc-200 rounded-lg
                         hover:bg-zinc-50 transition-colors cursor-pointer">+ Añadir</button>
                            </div>
                        </div>

                    </div>

                    <!-- Add new field -->
                    <button (click)="addField()" class="w-full py-3 text-sm text-zinc-500 border border-dashed border-zinc-300 rounded-xl
                   hover:border-zinc-400 hover:text-zinc-700 hover:bg-zinc-50 transition-colors cursor-pointer">
                        + Añadir columna
                    </button>

                    <!-- Save fields -->
                    <div class="pt-2">
                        <button (click)="saveFields()" [disabled]="savingFields()" class="w-full py-2.5 text-sm font-medium text-white bg-zinc-900 rounded-lg
                     hover:bg-zinc-700 disabled:opacity-50 transition-colors cursor-pointer">
                            {{ savingFields() ? 'Guardando...' : 'Guardar columnas' }}
                        </button>
                    </div>

                </div>
            </ng-container>

            <!-- ─── TAB: ADD ROW ─── -->
            <ng-container *ngIf="activeTab() === 'add-row'">
                <div class="space-y-4">

                    <p class="text-xs text-zinc-500">Completa los campos para añadir una nueva fila a la tabla.</p>

                    <div *ngFor="let field of fields()" class="space-y-1">
                        <label class="block text-xs font-medium text-zinc-700">{{ field.label }}</label>

                        <!-- text -->
                        <input *ngIf="field.type === 'text'" type="text" [(ngModel)]="newRowData[field.name]"
                            placeholder="{{ field.label }}..." class="w-full px-3 py-2 text-sm border border-zinc-200 rounded-lg bg-white
                     focus:outline-none focus:border-zinc-900 focus:ring-1 focus:ring-zinc-900 transition-colors" />

                        <!-- number -->
                        <input *ngIf="field.type === 'number'" type="number" [(ngModel)]="newRowData[field.name]"
                            placeholder="0" class="w-full px-3 py-2 text-sm border border-zinc-200 rounded-lg bg-white
                     focus:outline-none focus:border-zinc-900 focus:ring-1 focus:ring-zinc-900 transition-colors" />

                        <!-- date -->
                        <input *ngIf="field.type === 'date'" type="date" [(ngModel)]="newRowData[field.name]" class="w-full px-3 py-2 text-sm border border-zinc-200 rounded-lg bg-white cursor-pointer
                     focus:outline-none focus:border-zinc-900 focus:ring-1 focus:ring-zinc-900 transition-colors" />

                        <!-- boolean -->
                        <label *ngIf="field.type === 'boolean'" class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" [(ngModel)]="newRowData[field.name]"
                                class="w-4 h-4 rounded border-zinc-300 text-zinc-900 focus:ring-zinc-900 cursor-pointer" />
                            <span class="text-sm text-zinc-600">Activado</span>
                        </label>

                        <!-- select -->
                        <select *ngIf="field.type === 'select'" [(ngModel)]="newRowData[field.name]" class="w-full px-3 py-2 text-sm border border-zinc-200 rounded-lg bg-white cursor-pointer
                     focus:outline-none focus:border-zinc-900 focus:ring-1 focus:ring-zinc-900 transition-colors">
                            <option [ngValue]="null">— Selecciona —</option>
                            <option *ngFor="let opt of field.options" [ngValue]="opt">{{ opt }}</option>
                        </select>
                    </div>

                    <div class="pt-2">
                        <button (click)="addRow()" [disabled]="savingRow()" class="w-full py-2.5 text-sm font-medium text-white bg-zinc-900 rounded-lg
                     hover:bg-zinc-700 disabled:opacity-50 transition-colors cursor-pointer">
                            {{ savingRow() ? 'Guardando...' : 'Añadir fila' }}
                        </button>
                    </div>

                </div>
            </ng-container>

        </div>

        <!-- Footer status -->
        <div *ngIf="statusMessage()" class="px-6 py-3 border-t border-zinc-100 shrink-0">
            <p class="text-xs" [ngClass]="statusIsError() ? 'text-red-600' : 'text-emerald-600'">
                {{ statusMessage() }}
            </p>
        </div>

    </div>
</div>
