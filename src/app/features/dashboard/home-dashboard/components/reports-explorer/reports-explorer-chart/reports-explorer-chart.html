<div class="space-y-0">

    <!-- ══ SIN COMPONENTE ════════════════════════════════════════════════════ -->
    <div *ngIf="!componentAggregate"
        class="flex flex-col items-center justify-center gap-3 h-56 rounded-xl border border-dashed"
        style="border-color: #D6E0F0; background: #FAFCFF;">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: #EDF3FC;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4A6A9B" stroke-width="1.8"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 3v18h18" />
                <path d="M18 9l-5 5-2-2-4 4" />
            </svg>
        </div>
        <p class="text-[12px] font-medium" style="color: #8A9DC0;">
            Selecciona un componente para visualizar datos
        </p>
    </div>

    <!-- ══ SIN REGISTROS ═════════════════════════════════════════════════════ -->
    <div *ngIf="componentAggregate && componentAggregate.total_reports === 0"
        class="flex flex-col items-center justify-center gap-3 h-56 rounded-xl border border-dashed"
        style="border-color: #D6E0F0; background: #FAFCFF;">
        <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: #EDF3FC;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4A6A9B" stroke-width="1.8"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="9" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
        </div>
        <p class="text-[12px] font-medium" style="color: #8A9DC0;">
            Este componente aún no tiene registros
        </p>
    </div>

    <!-- ══ CONTENIDO PRINCIPAL ═══════════════════════════════════════════════ -->
    <ng-container *ngIf="componentAggregate && componentAggregate.total_reports > 0">

        <!-- Año + badge indicador: misma fila -->
        <div class="flex flex-wrap items-center justify-between gap-3 mb-4">

            <!-- Selector de año — mismo estilo que pills de variable -->
            <div class="flex items-center gap-1.5">
                <span class="text-[10px] font-bold uppercase tracking-[0.8px] mr-1" style="color: #4A6A9B;">Año</span>
                <button *ngFor="let year of availableYears" (click)="selectYear(year)"
                    class="px-3 py-1.5 rounded-lg text-[11px] font-semibold border transition-all duration-150"
                    [style.background]="year === currentYear ? '#1B3A6B' : '#F0F4FA'"
                    [style.color]="year === currentYear ? '#fff' : '#4A6A9B'"
                    [style.border-color]="year === currentYear ? '#1B3A6B' : '#D6E0F0'"
                    [style.box-shadow]="year === currentYear ? '0 2px 8px rgba(27,58,107,0.25)' : 'none'">
                    {{ year }}
                </button>
            </div>

            <!-- Badge del indicador seleccionado -->
            <div *ngIf="selectedIndicator" class="flex items-center gap-2 px-3 py-1.5 rounded-lg border"
                style="background: #EDF3FC; border-color: #C4D6EE;">
                <span class="w-2 h-2 rounded-full flex-shrink-0" style="background: #2d5fa8;"></span>
                <span class="text-[11px] font-semibold" style="color: #1B3A6B;">
                    {{ selectedIndicator.indicator_name }}
                </span>
                <ng-container *ngIf="indicatorTotal !== null">
                    <span class="w-[1px] h-3 mx-0.5" style="background: #C4D6EE;"></span>
                    <span class="text-[11px] font-bold" style="color: #2d5fa8;">
                        {{ indicatorTotal | number }}
                    </span>
                    <span class="text-[10px]" style="color: #8A9DC0;">total</span>
                </ng-container>
            </div>

        </div>

        <!-- ══ GRÁFICO ══════════════════════════════════════════════════════════ -->
        <div class="rounded-xl overflow-hidden border" style="border-color: #D6E0F0; background: #fff;">

            <!-- Sin datos para el año -->
            <div *ngIf="isChartEmpty" class="flex flex-col items-center justify-center gap-2 h-48">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#B0BDD0" stroke-width="1.8"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <line x1="3" y1="9" x2="21" y2="9" />
                    <line x1="9" y1="21" x2="9" y2="9" />
                </svg>
                <p class="text-[11px] font-medium" style="color: #8A9DC0;">
                    Sin registros para <strong style="color: #4A6A9B;">{{ currentYear }}</strong>
                </p>
            </div>

            <!-- Canvas -->
            <div *ngIf="!isChartEmpty" class="overflow-y-auto px-2 pt-3 pb-2"
                [style.maxHeight.px]="chartType === 'bar' && chartOptions?.indexAxis === 'y' ? 340 : null">
                <div [style.height.px]="chartHeight">
                    <ng-container *ngIf="chartData.datasets.length">
                        <canvas *ngIf="chartKey" baseChart [data]="chartData" [type]="chartType"
                            [options]="chartOptions">
                        </canvas>
                    </ng-container>
                </div>
            </div>

        </div>

    </ng-container>

</div>
