<div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-6">

  <app-dashboard-card title="Asistencias" [value]="kpis.asistenciasTecnicas"
    description="Asistencias técnicas realizadas" color="blue">
    <span icon class="inline-flex"><lucide-icon name="clipboard-list" [size]="20" [strokeWidth]="2"></lucide-icon></span>
  </app-dashboard-card>

  <app-dashboard-card title="Denuncias" [value]="kpis.denunciasReportadas" description="Denuncias reportadas"
    color="red">
    <span icon class="inline-flex"><lucide-icon name="triangle-alert" [size]="20" [strokeWidth]="2"></lucide-icon></span>
  </app-dashboard-card>

  <app-dashboard-card title="Personas" [value]="kpis.personasCapacitadas" description="Personas capacitadas"
    color="indigo">
    <span icon class="inline-flex"><lucide-icon name="user" [size]="20" [strokeWidth]="2"></lucide-icon></span>
  </app-dashboard-card>

  <app-dashboard-card title="Niños" [value]="kpis.ninosSensibilizados" description="Niños sensibilizados" color="green">
    <span icon class="inline-flex"><lucide-icon name="smile" [size]="20" [strokeWidth]="2"></lucide-icon></span>
  </app-dashboard-card>

  <app-dashboard-card title="Animales" [value]="kpis.animalesEsterilizados" description="Animales esterilizados"
    color="orange">
    <span icon class="inline-flex"><lucide-icon name="heart" [size]="20" [strokeWidth]="2"></lucide-icon></span>
  </app-dashboard-card>

  <app-dashboard-card title="Espacios" [value]="kpis.refugiosImpactados" description="Refugios impactados: Fundaciones - Albergues"
    color="purple">
    <span icon class="inline-flex"><lucide-icon name="house" [size]="20" [strokeWidth]="2"></lucide-icon></span>
  </app-dashboard-card>

  <app-dashboard-card title="Emprendedores" [value]="kpis.emprendedoresCofinanciados"
    description="Emprendedores cofinanciados" color="cyan">
    <span icon class="inline-flex"><lucide-icon name="globe" [size]="20" [strokeWidth]="2"></lucide-icon></span>
  </app-dashboard-card>

</div>
