<!-- components/map-toolbar/map-toolbar.html -->
<div class="absolute top-3 left-3 right-3 z-[999] flex items-center gap-2 flex-wrap">

    <!-- Selector año -->
    <div class="relative flex-shrink-0">
        <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3 h-3 pointer-events-none" fill="none"
            viewBox="0 0 24 24" stroke="#6B87B2" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" />
            <path d="M16 2v4M8 2v4M3 10h18" />
        </svg>
        <select [ngModel]="selectedYear" (ngModelChange)="yearChange.emit(+$event)"
            class="pl-7 pr-6 py-1.5 text-[11px] rounded-xl outline-none appearance-none cursor-pointer"
            style="background:rgba(255,255,255,0.95);border:1.5px solid #D6E0F0;color:#1B3A6B;backdrop-filter:blur(8px);box-shadow:0 2px 8px rgba(0,0,0,0.08);">
            <option *ngFor="let y of availableYears" [value]="y">{{ y }}</option>
        </select>
        <svg class="absolute right-2 top-1/2 -translate-y-1/2 w-3 h-3 pointer-events-none" fill="none"
            viewBox="0 0 24 24" stroke="#9BB1D6" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
    </div>

    <!-- KPI Pills -->
    <div class="flex items-center gap-1.5 flex-wrap">
        <button *ngFor="let kpi of KPI_OPTIONS" (click)="kpiChange.emit(selectedKpi === kpi.id ? '' : kpi.id)"
            class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-xl text-[10px] font-semibold transition-all cursor-pointer"
            [style.background]="selectedKpi === kpi.id ? kpi.color : 'rgba(255,255,255,0.92)'"
            [style.color]="selectedKpi === kpi.id ? '#fff' : '#4A6A9B'"
            [style.border]="selectedKpi === kpi.id ? '1.5px solid '+kpi.color : '1.5px solid rgba(214,224,240,0.8)'"
            style="backdrop-filter:blur(8px);box-shadow:0 2px 8px rgba(0,0,0,0.08);">
            <span class="w-1.5 h-1.5 rounded-full flex-shrink-0"
                [style.background]="selectedKpi === kpi.id ? 'rgba(255,255,255,0.7)' : kpi.color"></span>
            {{ kpi.label }}
        </button>
    </div>

</div>
