<!-- components/map-toolbar/map-toolbar.html -->
<div class="absolute top-3 left-3 right-3 z-[999] flex items-center gap-2 flex-wrap">

    <!-- Búsqueda -->
    <div class="relative flex-shrink-0">
        <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3 h-3 pointer-events-none" fill="none"
            viewBox="0 0 24 24" stroke="#6B87B2" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" />
        </svg>
        <input type="text" [ngModel]="searchQuery" (ngModelChange)="searchChange.emit($event)"
            placeholder="Buscar municipio..." class="pl-7 pr-3 py-1.5 text-[11px] rounded-xl outline-none w-44"
            style="background:rgba(255,255,255,0.95);border:1.5px solid #D6E0F0;color:#1B3A6B;backdrop-filter:blur(8px);box-shadow:0 2px 8px rgba(0,0,0,0.08);"
            onfocus="this.style.borderColor='#2d5fa8';this.style.width='200px'"
            onblur="this.style.borderColor='#D6E0F0';this.style.width='176px'" />
    </div>

    <!-- Selector año -->
    <div class="relative flex-shrink-0">
        <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3 h-3 pointer-events-none" fill="none"
            viewBox="0 0 24 24" stroke="#6B87B2" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" />
            <path d="M16 2v4M8 2v4M3 10h18" />
        </svg>
        <select [ngModel]="selectedYear" (ngModelChange)="yearChange.emit(+$event)"
            class="pl-7 pr-6 py-1.5 text-[11px] rounded-xl outline-none appearance-none cursor-pointer"
            style="background:rgba(255,255,255,0.95);border:1.5px solid #D6E0F0;color:#1B3A6B;backdrop-filter:blur(8px);box-shadow:0 2px 8px rgba(0,0,0,0.08);">
            <option *ngFor="let y of availableYears" [value]="y">{{ y }}</option>
        </select>
        <svg class="absolute right-2 top-1/2 -translate-y-1/2 w-3 h-3 pointer-events-none" fill="none"
            viewBox="0 0 24 24" stroke="#9BB1D6" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
    </div>

    <!-- KPI Pills -->
    <div class="flex items-center gap-1.5 flex-wrap">
        <button *ngFor="let kpi of KPI_OPTIONS" (click)="kpiChange.emit(kpi.id)"
            class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-xl text-[10px] font-semibold transition-all cursor-pointer"
            [style.background]="selectedKpi === kpi.id ? kpi.color : 'rgba(255,255,255,0.92)'"
            [style.color]="selectedKpi === kpi.id ? '#fff' : '#4A6A9B'"
            [style.border]="selectedKpi === kpi.id ? '1.5px solid '+kpi.color : '1.5px solid rgba(214,224,240,0.8)'"
            style="backdrop-filter:blur(8px);box-shadow:0 2px 8px rgba(0,0,0,0.08);">
            <span class="w-1.5 h-1.5 rounded-full flex-shrink-0"
                [style.background]="selectedKpi === kpi.id ? 'rgba(255,255,255,0.7)' : kpi.color"></span>
            {{ kpi.label }}
        </button>
    </div>

    <!-- Style picker -->
    <div class="ml-auto relative flex-shrink-0">
        <button (click)="showStylePicker = !showStylePicker"
            class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-[11px] font-semibold cursor-pointer"
            style="background:rgba(255,255,255,0.95);border:1.5px solid #D6E0F0;color:#1B3A6B;backdrop-filter:blur(8px);box-shadow:0 2px 8px rgba(0,0,0,0.08);">
            <span>{{ getSelectedStyle().icon }}</span>
            <span>{{ getSelectedStyle().label }}</span>
            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="#9BB1D6" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
            </svg>
        </button>
        <div *ngIf="showStylePicker" class="absolute right-0 mt-1.5 rounded-xl shadow-xl overflow-hidden w-36 border"
            style="background:#fff;border-color:#D6E0F0;z-index:1000;">
            <button *ngFor="let style of MAP_STYLES" (click)="styleChange.emit(style.id); showStylePicker=false"
                class="w-full flex items-center gap-2 px-3 py-2 text-[11px] cursor-pointer transition-colors"
                [style.background]="selectedStyleId === style.id ? '#EDF3FC' : '#fff'"
                [style.color]="selectedStyleId === style.id ? '#1B3A6B' : '#4A6A9B'"
                [style.fontWeight]="selectedStyleId === style.id ? '600' : '400'">
                <span>{{ style.icon }}</span>
                <span>{{ style.label }}</span>
                <svg *ngIf="selectedStyleId === style.id" class="w-3 h-3 ml-auto" fill="none" viewBox="0 0 24 24"
                    stroke="#1B3A6B" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            </button>
        </div>
    </div>

</div>
