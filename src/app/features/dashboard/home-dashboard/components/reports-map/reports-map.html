<!-- reports-map.html -->
<div class="relative w-full" style="min-height:580px;">

    <div [id]="MAP_ID" class="absolute inset-0 w-full h-full"
        style="min-height:580px;z-index:0;border-radius:0 0 12px 12px;"></div>

    <app-map-toolbar [selectedKpi]="selectedKpi" [selectedYear]="selectedYear" [availableYears]="availableYears"
        (kpiChange)="onKpiChange($event)" (yearChange)="onYearChange($event)">
    </app-map-toolbar>
    
    <app-map-list [municipios]="filteredMunicipios" [selectedMunicipio]="selectedMunicipio" [activeKpi]="getActiveKpi()"
        [selectedKpiId]="selectedKpi" (municipioSelect)="selectMunicipio($event)">
    </app-map-list>

    <app-map-detail *ngIf="selectedMunicipio" [municipio]="selectedMunicipio" [activeKpi]="getActiveKpi()"
        [selectedKpiId]="selectedKpi" (close)="closeSidePanel()">
    </app-map-detail>

    <div *ngIf="reports.length === 0" class="absolute inset-0 flex flex-col items-center justify-center gap-3 z-10"
        style="background:rgba(255,255,255,0.88);backdrop-filter:blur(4px);">
        <div class="w-12 h-12 rounded-2xl flex items-center justify-center" style="background:#F0F4FA;">
            <lucide-icon name="map-pin" [size]="24" color="#4A6A9B" [strokeWidth]="1.5"></lucide-icon>
        </div>
        <p class="text-[12px] font-medium" style="color:#4A6A9B;">Sin reportes con ubicación registrada</p>
    </div>

</div>
