<div class="border border-[#eef2f8] rounded-xl p-3 space-y-3 bg-[#f9fbff]">

    <!-- Nombre -->
    <div class="flex items-center gap-2">
        <span class="text-xs font-semibold text-[#2d5fa8] w-5 text-center">{{ index + 1 }}</span>
        <input type="text" [(ngModel)]="activity.name" [name]="namePrefix + '_name'"
            placeholder="Nombre de la actividad *" class="flex-1 text-sm border rounded-lg px-3 py-2 bg-white
               focus:outline-none focus:ring-2 focus:ring-[#2d5fa8]/30 transition"
            [class.border-red-300]="showNameError && !activity.name.trim()"
            [class.border-d6e2f2]="!showNameError || activity.name.trim()" />
        <button *ngIf="canRemove" (click)="remove.emit()" type="button"
            class="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>

    <!-- Entregable + Fecha -->
    <div class="grid grid-cols-2 gap-3 pl-7">
        <div class="flex flex-col gap-1">
            <label class="text-xs font-semibold text-[#1B3A6B]">Entregable <span class="text-red-500">*</span></label>
            <input type="text" [(ngModel)]="activity.deliverable" [name]="namePrefix + '_deliverable'"
                placeholder="Producto o resultado esperado..." class="text-sm border border-[#d6e2f2] rounded-lg px-3 py-2 bg-white
               focus:outline-none focus:ring-2 focus:ring-[#2d5fa8]/30 transition" />
        </div>
        <div class="flex flex-col gap-1">
            <label class="text-xs font-semibold text-[#1B3A6B]">
                Fecha de entrega <span class="text-red-500">*</span>
                <span *ngIf="isEditMode && activity.recurrence.enabled" class="text-slate-400 font-normal ml-1">
                    (solo esta ocurrencia)
                </span>
            </label>
            <input type="date" [(ngModel)]="activity.delivery_date" [name]="namePrefix + '_date'" class="text-sm border border-[#d6e2f2] rounded-lg px-3 py-2 bg-white
               focus:outline-none focus:ring-2 focus:ring-[#2d5fa8]/30 transition" />
        </div>
    </div>

    <!-- Requiere jefe -->
    <div class="pl-7 flex items-center gap-4">
        <label class="text-xs font-semibold text-[#1B3A6B]">¿Requiere asistencia del jefe?</label>
        <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" [(ngModel)]="activity.requires_boss_assistance" [value]="true"
                [name]="namePrefix + '_boss'" class="accent-[#2d5fa8]" />
            <span class="text-sm text-slate-700">Sí</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" [(ngModel)]="activity.requires_boss_assistance" [value]="false"
                [name]="namePrefix + '_boss'" class="accent-[#2d5fa8]" />
            <span class="text-sm text-slate-700">No</span>
        </label>
    </div>

    <!-- Recurrencia -->
    <div *ngIf="showRecurrence" class="pl-7">
        <app-action-plan-recurrence-panel [recurrence]="activity.recurrence" [delivery_date]="activity.delivery_date"
            [namePrefix]="namePrefix + '_rec'">
        </app-action-plan-recurrence-panel>
    </div>

    <!-- Personal de apoyo -->
    <div class="pl-7 space-y-2">
        <p class="text-xs font-semibold text-[#1B3A6B]">Personal de apoyo</p>

        <div *ngFor="let staff of activity.support_staff; let si = index" class="flex items-center gap-2">
            <input type="text" [(ngModel)]="staff.name" [name]="namePrefix + '_staff_' + si"
                placeholder="Nombre completo..." class="flex-1 text-sm border border-[#d6e2f2] rounded-lg px-3 py-2 bg-white
               focus:outline-none focus:ring-2 focus:ring-[#2d5fa8]/30 transition" />
            <button (click)="removeStaff.emit(si)" type="button"
                class="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <button (click)="addStaff.emit()" type="button"
            class="flex items-center gap-1.5 text-xs font-medium text-[#2d5fa8] hover:text-[#1B3A6B]">
            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            Agregar personal de apoyo
        </button>
    </div>

</div>
