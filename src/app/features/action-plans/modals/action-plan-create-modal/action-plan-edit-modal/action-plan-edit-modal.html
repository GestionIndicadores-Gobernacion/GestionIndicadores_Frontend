<!-- BACKDROP -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4" (click)="onClose()">
    <div class="absolute inset-0 bg-[#0f172a]/40 backdrop-blur-sm"></div>

    <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh]
              flex flex-col overflow-hidden border border-[#e6edf7]" (click)="$event.stopPropagation()">

        <!-- HEADER -->
        <div class="flex items-center justify-between px-5 py-4 flex-shrink-0 border-b border-[#e6edf7]
                bg-gradient-to-r from-[#1B3A6B] to-[#2d5fa8] text-white">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-xl bg-white/15 flex items-center justify-center">
                    <lucide-icon name="pencil" [size]="16" [strokeWidth]="2" color="white"></lucide-icon>
                </div>
                <div>
                    <h2 class="text-sm font-semibold">Editar actividad</h2>
                    <p class="text-xs text-blue-100 mt-0.5">
                        {{ isRecurrent ? 'Actividad recurrente' : 'Actividad individual' }}
                    </p>
                </div>
            </div>
            <button (click)="onClose()" class="p-1.5 rounded-lg hover:bg-white/10 transition">
                <lucide-icon name="x" [size]="16" [strokeWidth]="2" color="white"></lucide-icon>
            </button>
        </div>

        <!-- BODY -->
        <div class="overflow-y-auto flex-1 px-5 py-4 bg-[#f7f9fc]">

            <!-- Aviso recurrente -->
            <div *ngIf="isRecurrent" class="flex items-start gap-2 px-3 py-2.5 rounded-xl border mb-4"
                style="background:#FFF7ED;border-color:#FED7AA;">
                <span class="text-orange-500 mt-0.5 shrink-0 inline-flex">
                    <lucide-icon name="refresh-cw" [size]="16" [strokeWidth]="2" color="currentColor"></lucide-icon>
                </span>
                <p class="text-xs text-orange-700">
                    Esta actividad pertenece a un grupo recurrente. Puedes editar solo esta ocurrencia o todas las
                    pendientes del grupo.
                </p>
            </div>

            <!-- Formulario reutilizable -->
            <app-action-plan-activity-form *ngIf="form" [activity]="form" [index]="0" namePrefix="edit"
                [canRemove]="false" [showRecurrence]="false" [isEditMode]="true" (addStaff)="addStaff()"
                (removeStaff)="removeStaff($event)">
            </app-action-plan-activity-form>

            <p *ngIf="error" class="text-xs text-red-500 mt-3">{{ error }}</p>
        </div>

        <!-- FOOTER -->
        <div class="flex items-center justify-end gap-2 px-5 py-3 border-t border-[#e6edf7] bg-white flex-shrink-0">
            <button (click)="onClose()" type="button"
                class="px-3 py-1.5 text-sm font-medium text-slate-600 border border-[#d6e2f2] rounded-lg hover:bg-slate-50 transition">
                Cancelar
            </button>

            <!-- Recurrente → dos botones -->
            <ng-container *ngIf="isRecurrent">
                <button (click)="submit(false)" type="button" [disabled]="saving" class="px-3 py-1.5 text-sm font-medium text-[#1B3A6B] border border-[#1B3A6B] rounded-lg
                 hover:bg-[#EDF3FC] transition disabled:opacity-40">
                    {{ saving ? 'Guardando...' : 'Solo esta' }}
                </button>
                <button (click)="submit(true)" type="button" [disabled]="saving" class="px-3 py-1.5 text-sm font-medium text-white rounded-lg transition disabled:opacity-40
                 bg-gradient-to-r from-[#1B3A6B] to-[#2d5fa8] hover:opacity-90">
                    {{ saving ? 'Guardando...' : 'Todas las pendientes' }}
                </button>
            </ng-container>

            <!-- Individual → un botón -->
            <button *ngIf="!isRecurrent" (click)="submit(false)" type="button" [disabled]="saving" class="px-3 py-1.5 text-sm font-medium text-white rounded-lg transition disabled:opacity-40
               bg-gradient-to-r from-[#1B3A6B] to-[#2d5fa8] hover:opacity-90">
                {{ saving ? 'Guardando...' : 'Guardar cambios' }}
            </button>
        </div>
    </div>
</div>
