<!-- CABECERA DÍAS -->
<div class="grid grid-cols-7 border-b border-[#EBF0FA] bg-[#F8FAFD]">
    <div *ngFor="let day of WEEKDAYS"
        class="py-2 sm:py-3 text-center text-[10px] sm:text-[10.5px] font-bold uppercase tracking-[1px] text-[#4A6A9B]">
        <span class="sm:hidden">{{ day[0] }}</span>
        <span class="hidden sm:inline">{{ day }}</span>
    </div>
</div>


<!-- GRID -->
<div class="grid grid-cols-7 divide-x divide-y divide-[#EBF0FA] border-b border-[#EBF0FA]">
    <div *ngFor="let day of calendarDays; trackBy: trackByDay"
        class="min-h-[72px] sm:h-[155px] p-1 sm:p-2 flex flex-col gap-0.5 overflow-hidden transition-colors active:bg-[#EDF3FC]"
        [class.bg-[#F8FAFD]]="!day.isCurrentMonth" [class.bg-white]="day.isCurrentMonth"
        [style.cursor]="day.isCurrentMonth && countActivitiesInDay(day) > 0 ? 'pointer' : 'default'"
        (click)="onCellTap(day)">

        <!-- Número + badge contador (desktop) -->
        <div class="flex items-center justify-between sm:px-0 mb-0.5">
            <span
                class="text-[11px] sm:text-xs font-bold w-6 h-6 sm:w-6 sm:h-6 flex items-center justify-center rounded-full"
                [ngClass]="day.isToday
          ? 'bg-gradient-to-br from-[#1B3A6B] to-[#2d5fa8] text-white shadow-sm'
          : day.isCurrentMonth ? 'text-[#1B3A6B]' : 'text-[#B3CCE8]'">
                {{ day.date.getDate() }}
            </span>
            <!-- Badge contador — solo desktop -->
            <span *ngIf="countActivitiesInDay(day) > 0 && day.isCurrentMonth"
                class="hidden sm:inline text-[10px] font-bold px-1.5 py-0.5 rounded-full bg-[#D6E4F7] text-[#1B3A6B] border border-[#B3CCE8]">
                {{ countActivitiesInDay(day) }}
            </span>
        </div>

        <!-- Mobile: barras horizontales apiladas (1 por actividad).
             Cada barra es de ancho completo de la celda y 6px de alto —
             mucho más visibles que dots y no requieren ser tappables
             porque TODA la celda es el tap-target (`onCellTap` abre la
             agenda del día con los detalles). -->
        <div class="sm:hidden flex flex-col gap-1 mt-1"
            *ngIf="day.isCurrentMonth && countActivitiesInDay(day) > 0">
            <span *ngFor="let flat of getFlatActivitiesForDay(day).slice(0, 3); trackBy: trackByFlat"
                class="block h-1.5 rounded w-full"
                [ngClass]="statusDot(flat.activity.status!, flat.activity.generates_report)"></span>
            <!-- Overflow legible -->
            <span *ngIf="countActivitiesInDay(day) > 3"
                class="text-[10.5px] font-bold leading-none mt-0.5 text-center"
                style="color:#2d5fa8;">
                +{{ countActivitiesInDay(day) - 3 }}
            </span>
        </div>

        <!-- Desktop: cards -->
        <ng-container *ngFor="let flat of getFlatActivitiesForDay(day).slice(0, 3); trackBy: trackByFlat">
            <div class="hidden sm:flex group items-start gap-1 px-1.5 py-1 rounded-lg border transition hover:shadow-sm"
                [ngClass]="statusClass(flat.activity.status!, flat.activity.generates_report)"
                [class.cursor-pointer]="canOpen(flat.plan, flat.activity)"
                [class.cursor-default]="!canOpen(flat.plan, flat.activity)"
                [class.opacity-70]="!canOpen(flat.plan, flat.activity)"
                (click)="$event.stopPropagation(); canOpen(flat.plan, flat.activity) && report.emit({ plan: flat.plan, objective: flat.obj, activity: flat.activity, event: $event })"
                (mouseenter)="showTooltip({ plan: flat.plan, objective: flat.obj, activity: flat.activity }, $event)"
                (mouseleave)="hover.emit(null)">

                <span class="w-1.5 h-1.5 rounded-full mt-1 flex-shrink-0"
                    [ngClass]="statusDot(flat.activity.status!, flat.activity.generates_report)"></span>

                <p class="text-xs font-semibold truncate leading-tight">{{ flat.activity.name }}</p>
                
                <button *ngIf="flat.activity.status !== 'Realizado' && flat.activity.status !== 'Pendiente de Evidencia' && canEditPlan(flat.plan)"
                    (click)="edit.emit({ plan: flat.plan, objective: flat.obj, activity: flat.activity, event: $event }); $event.stopPropagation()"
                    class="opacity-0 group-hover:opacity-100 transition text-[#2d5fa8]">
                    <lucide-icon name="pencil" [size]="12" [strokeWidth]="2" color="currentColor"></lucide-icon>
                </button>

                <button *ngIf="flat.activity.status !== 'Realizado' && flat.activity.status !== 'Pendiente de Evidencia' && canInteract(flat.plan)"
                    (click)="delete.emit({ activityId: flat.activity.id!, event: $event }); $event.stopPropagation()"
                    class="opacity-0 group-hover:opacity-100 transition text-red-600">
                    <lucide-icon name="x" [size]="12" [strokeWidth]="2" color="currentColor"></lucide-icon>
                </button>
            </div>
        </ng-container>

        <!-- +más desktop -->
        <span *ngIf="countActivitiesInDay(day) > 3 && day.isCurrentMonth"
            (click)="$event.stopPropagation(); openAgenda.emit(day)"
            class="hidden sm:block text-[10px] font-bold text-center py-0.5 rounded-md cursor-pointer
             bg-[#EBF0FA] text-[#2d5fa8] border border-[#D6E0F0] hover:bg-[#D6E4F7] transition mt-auto shrink-0">
            +{{ countActivitiesInDay(day) - 3 }} más
        </span>

    </div>
</div>
