<div class="rounded-2xl bg-white border border-[#D6E0F0] shadow-sm overflow-hidden">
    <div class="h-[3px] bg-gradient-to-r from-[#1B3A6B] via-[#2d5fa8] to-[#1B3A6B]"></div>
    <div class="px-4 sm:px-5 py-3 sm:py-4 flex flex-col gap-3 sm:gap-4">

        <!-- Inputs en grid responsivo: 1 col en móvil, 2 cols en sm,
             distribución 12-col en lg+ (estrategia / componente / búsqueda /
             responsables / fechas) para que nada se apriete ni desborde. -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-12 gap-2 sm:gap-3">

            <!-- Estrategia -->
            <div class="flex flex-col gap-1 lg:col-span-3">
                <label class="text-[10.5px] font-bold uppercase tracking-[1px] text-[#1B3A6B]">Estrategia</label>
                <select (change)="onStrategyChange($event)" class="text-sm rounded-xl px-3 py-2 w-full bg-[#F0F4FA] border border-[#D6E0F0] text-[#1B3A6B]
                 focus:border-[#2d5fa8] focus:ring-2 focus:ring-[#2d5fa8]/20 transition">
                    <option value="">Todas las estrategias</option>
                    <option *ngFor="let s of strategies" [value]="s.id">{{ s.name }}</option>
                </select>
            </div>

            <!-- Componente -->
            <div class="flex flex-col gap-1 lg:col-span-3">
                <label class="text-[10.5px] font-bold uppercase tracking-[1px] text-[#1B3A6B]">Componente</label>
                <select (change)="onComponentChange($event)" [disabled]="!selectedStrategyId" class="text-sm rounded-xl px-3 py-2 w-full bg-[#F0F4FA] border border-[#D6E0F0] text-[#1B3A6B]
                 focus:border-[#2d5fa8] focus:ring-2 focus:ring-[#2d5fa8]/20
                 disabled:opacity-40 disabled:cursor-not-allowed transition">
                    <option value="">Todos los componentes</option>
                    <option *ngFor="let c of filteredComponents" [value]="c.id">{{ c.name }}</option>
                </select>
            </div>

            <!-- Búsqueda por nombre de actividad -->
            <div class="flex flex-col gap-1 lg:col-span-3">
                <label class="text-[10.5px] font-bold uppercase tracking-[1px] text-[#1B3A6B]">
                    Buscar actividad
                </label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none inline-flex">
                        <lucide-icon name="search" [size]="13" [strokeWidth]="2" color="#8A9DC0"></lucide-icon>
                    </span>
                    <input type="text"
                        [ngModel]="searchTerm" (ngModelChange)="searchChange.emit($event)"
                        placeholder="Nombre de la actividad..."
                        class="w-full text-sm rounded-xl pl-9 pr-3 py-2 bg-[#F0F4FA] border border-[#D6E0F0] text-[#1B3A6B]
                               focus:border-[#2d5fa8] focus:ring-2 focus:ring-[#2d5fa8]/20 outline-none transition" />
                </div>
            </div>

            <!-- Responsables -->
            <div class="flex flex-col gap-1 lg:col-span-3">
                <label class="text-[10.5px] font-bold uppercase tracking-[1px] text-[#1B3A6B]">
                    Responsables
                </label>
                <select (change)="onAddResponsible($event)"
                    [disabled]="availableUsers.length === 0"
                    class="text-sm rounded-xl px-3 py-2 w-full bg-[#F0F4FA] border border-[#D6E0F0] text-[#1B3A6B]
                           focus:border-[#2d5fa8] focus:ring-2 focus:ring-[#2d5fa8]/20
                           disabled:opacity-40 disabled:cursor-not-allowed transition">
                    <option value="">
                        {{ availableUsers.length === 0 && selectedUsers.length > 0
                            ? 'Todos los responsables seleccionados'
                            : 'Agregar responsable...' }}
                    </option>
                    <option *ngFor="let u of availableUsers" [value]="u.id">
                        {{ userDisplayName(u) }}
                    </option>
                </select>
            </div>

            <!-- Rango de fecha de entrega — en lg comparten fila propia (col-span 6) -->
            <div class="flex flex-col gap-1 lg:col-span-3">
                <label class="text-[10.5px] font-bold uppercase tracking-[1px] text-[#1B3A6B]">
                    Entrega desde
                </label>
                <input type="date"
                    [ngModel]="deliveryDateFrom" (ngModelChange)="deliveryDateFromChange.emit($event || null)"
                    class="w-full text-sm rounded-xl px-3 py-2 bg-[#F0F4FA] border border-[#D6E0F0] text-[#1B3A6B]
                           focus:border-[#2d5fa8] focus:ring-2 focus:ring-[#2d5fa8]/20 outline-none transition" />
            </div>
            <div class="flex flex-col gap-1 lg:col-span-3">
                <label class="text-[10.5px] font-bold uppercase tracking-[1px] text-[#1B3A6B]">
                    Hasta
                </label>
                <input type="date"
                    [ngModel]="deliveryDateTo" (ngModelChange)="deliveryDateToChange.emit($event || null)"
                    class="w-full text-sm rounded-xl px-3 py-2 bg-[#F0F4FA] border border-[#D6E0F0] text-[#1B3A6B]
                           focus:border-[#2d5fa8] focus:ring-2 focus:ring-[#2d5fa8]/20 outline-none transition" />
            </div>

        </div>

        <!-- Chips de responsables seleccionados -->
        <div *ngIf="selectedUsers.length > 0" class="flex flex-wrap gap-1.5">
            <span *ngFor="let u of selectedUsers"
                class="inline-flex items-center gap-1.5 text-[11px] font-semibold pl-2.5 pr-1 py-1 rounded-full border max-w-full"
                style="background:#EDF3FC;color:#1B3A6B;border-color:#C4D6EE;">
                <lucide-icon name="user" [size]="11" [strokeWidth]="2" color="currentColor" class="shrink-0"></lucide-icon>
                <span class="truncate">{{ userDisplayName(u) }}</span>
                <button type="button" (click)="onRemoveResponsible(u.id)"
                    class="w-4 h-4 rounded-full flex items-center justify-center hover:brightness-110 transition shrink-0"
                    style="background:#1B3A6B;color:white;"
                    [attr.aria-label]="'Quitar ' + userDisplayName(u)">
                    <lucide-icon name="x" [size]="9" [strokeWidth]="2.5" color="currentColor"></lucide-icon>
                </button>
            </span>
        </div>

        <!-- Quick filters — scroll horizontal en móvil -->
        <div class="flex items-center gap-1.5 sm:gap-2 overflow-x-auto pb-1 sm:pb-0 sm:flex-wrap scrollbar-hide">
            <span
                class="text-[10px] font-bold uppercase tracking-[1px] text-[#8A9DC0] hidden sm:inline mr-1 shrink-0">Filtrar</span>

            <button (click)="statusChange.emit('all')"
                class="px-2.5 sm:px-3 py-1 sm:py-1.5 text-xs font-semibold rounded-lg border transition shrink-0"
                [ngClass]="activeStatusFilter === 'all'
          ? 'bg-gradient-to-br from-[#1B3A6B] to-[#2d5fa8] text-white border-transparent'
          : 'bg-white text-[#4A6A9B] border-[#D6E0F0] hover:border-[#2d5fa8]'">
                Todos
            </button>

            <button (click)="statusChange.emit('Realizado')"
                class="flex items-center gap-1 sm:gap-1.5 px-2.5 sm:px-3 py-1 sm:py-1.5 text-xs font-semibold rounded-lg border transition shrink-0"
                [ngClass]="activeStatusFilter === 'Realizado'
          ? 'bg-emerald-600 text-white border-transparent'
          : 'bg-white text-emerald-600 border-emerald-200 hover:bg-emerald-50'">
                <span class="w-1.5 h-1.5 rounded-full shrink-0" [class.bg-white]="activeStatusFilter === 'Realizado'"
                    [class.bg-emerald-600]="activeStatusFilter !== 'Realizado'"></span>
                Realizados
            </button>

            <button (click)="statusChange.emit('En Ejecución')"
                class="flex items-center gap-1 sm:gap-1.5 px-2.5 sm:px-3 py-1 sm:py-1.5 text-xs font-semibold rounded-lg border transition shrink-0"
                [ngClass]="activeStatusFilter === 'En Ejecución'
          ? 'bg-[#2d5fa8] text-white border-transparent'
          : 'bg-white text-[#2d5fa8] border-blue-200 hover:bg-blue-50'">
                <span class="w-1.5 h-1.5 rounded-full shrink-0" [class.bg-white]="activeStatusFilter === 'En Ejecución'"
                    [class.bg-blue-500]="activeStatusFilter !== 'En Ejecución'"></span>
                En Ejecución
            </button>

            <button (click)="statusChange.emit('Pendiente')"
                class="flex items-center gap-1 sm:gap-1.5 px-2.5 sm:px-3 py-1 sm:py-1.5 text-xs font-semibold rounded-lg border transition shrink-0"
                [ngClass]="activeStatusFilter === 'Pendiente'
          ? 'bg-red-600 text-white border-transparent'
          : 'bg-white text-red-600 border-red-200 hover:bg-red-50'">
                <span class="w-1.5 h-1.5 rounded-full shrink-0" [class.bg-white]="activeStatusFilter === 'Pendiente'"
                    [class.bg-red-600]="activeStatusFilter !== 'Pendiente'"></span>
                Pendientes
            </button>

            <button (click)="statusChange.emit('Pendiente de Evidencia')"
                class="flex items-center gap-1 sm:gap-1.5 px-2.5 sm:px-3 py-1 sm:py-1.5 text-xs font-semibold rounded-lg border transition shrink-0"
                [ngClass]="activeStatusFilter === 'Pendiente de Evidencia'
          ? 'bg-amber-500 text-white border-transparent'
          : 'bg-white text-amber-600 border-amber-200 hover:bg-amber-50'">
                <span class="w-1.5 h-1.5 rounded-full shrink-0"
                    [class.bg-white]="activeStatusFilter === 'Pendiente de Evidencia'"
                    [class.bg-amber-500]="activeStatusFilter !== 'Pendiente de Evidencia'"></span>
                Sin evidencia
            </button>

            <div class="w-px h-4 sm:h-5 bg-[#D6E0F0] mx-0.5 sm:mx-1 shrink-0"></div>

            <button (click)="bossChange.emit(!filterByBoss)"
                class="flex items-center gap-1 sm:gap-1.5 px-2.5 sm:px-3 py-1 sm:py-1.5 text-xs font-semibold rounded-lg border transition shrink-0"
                [ngClass]="filterByBoss
          ? 'bg-amber-600 text-white border-transparent'
          : 'bg-white text-amber-600 border-amber-200 hover:bg-amber-50'">
                <lucide-icon name="user-check" [size]="12" [strokeWidth]="2" color="currentColor"></lucide-icon>
                <span class="hidden xs:inline">Requiere jefe</span>
                <span class="xs:hidden">Jefe</span>
            </button>

            <button (click)="myPlansChange.emit(!filterMyPlans)"
                class="flex items-center gap-1 sm:gap-1.5 px-2.5 sm:px-3 py-1 sm:py-1.5 text-xs font-semibold rounded-lg border transition shrink-0"
                [ngClass]="filterMyPlans
          ? 'bg-[#1B3A6B] text-white border-transparent'
          : 'bg-white text-[#1B3A6B] border-[#D6E0F0] hover:bg-[#F0F4FA]'">
                <lucide-icon name="user" [size]="12" [strokeWidth]="2" color="currentColor"></lucide-icon>
                <span class="hidden xs:inline">Mis planes</span>
                <span class="xs:hidden">Mis planes asignados</span>
            </button>

            <!-- Toggle de generates_report (3 estados: todos / sí / no) -->
            <div class="flex rounded-lg border overflow-hidden shrink-0" style="border-color:#D6E0F0;">
                <button type="button" (click)="generatesReportChange.emit('all')"
                    class="px-2 py-1 text-[11px] font-bold transition"
                    [style.background]="generatesReportFilter === 'all' ? '#1B3A6B' : 'white'"
                    [style.color]="generatesReportFilter === 'all' ? 'white' : '#4A6A9B'">
                    Todas
                </button>
                <button type="button" (click)="generatesReportChange.emit('yes')"
                    class="px-2 py-1 text-[11px] font-bold border-l transition flex items-center gap-1"
                    style="border-color:#D6E0F0;"
                    [style.background]="generatesReportFilter === 'yes' ? '#059669' : 'white'"
                    [style.color]="generatesReportFilter === 'yes' ? 'white' : '#047857'"
                    title="Solo actividades que generan reporte vinculado">
                    <lucide-icon name="file-plus" [size]="11" [strokeWidth]="2" color="currentColor"></lucide-icon>
                    Genera
                </button>
                <button type="button" (click)="generatesReportChange.emit('no')"
                    class="px-2 py-1 text-[11px] font-bold border-l transition"
                    style="border-color:#D6E0F0;"
                    [style.background]="generatesReportFilter === 'no' ? '#3f3f46' : 'white'"
                    [style.color]="generatesReportFilter === 'no' ? 'white' : '#52525b'"
                    title="Solo actividades sin reporte vinculado">
                    Sin
                </button>
            </div>

            <!-- Limpiar todos los filtros -->
            <button *ngIf="hasActiveFilters" (click)="clearAll.emit()"
                class="flex items-center gap-1 sm:gap-1.5 px-2.5 sm:px-3 py-1 sm:py-1.5 text-xs font-semibold rounded-lg border transition shrink-0"
                style="background:white;color:#dc2626;border-color:#FECACA;"
                onmouseover="this.style.background='#FEF2F2'"
                onmouseout="this.style.background='white'">
                <lucide-icon name="x" [size]="12" [strokeWidth]="2.2" color="currentColor"></lucide-icon>
                <span class="hidden xs:inline">Limpiar filtros</span>
                <span class="xs:hidden">Limpiar</span>
            </button>

            <!-- Badges de estado -->
            <span *ngIf="activeStatusFilter !== 'all' || filterByBoss"
                class="ml-auto shrink-0 text-[11px] font-semibold px-2.5 py-1 rounded-full bg-[#D6E4F7] text-[#1B3A6B] border border-[#B3CCE8]">
                {{ filteredPlansCount }} {{ filteredPlansCount === 1 ? 'act.' : 'acts.' }}
            </span>

            <span *ngIf="selectedDayFilter"
                class="shrink-0 text-[11px] font-semibold px-2.5 py-1 rounded-full flex items-center gap-1.5 bg-amber-100 text-amber-900 border border-amber-300">
                {{ selectedDayFilter | date:'dd/MM' }}
                <button (click)="clearDayFilter.emit()"
                    class="text-xs font-bold w-4 h-4 rounded-full bg-amber-500 text-white hover:brightness-110 flex items-center justify-center">
                    ×
                </button>
            </span>
        </div>

        <!-- Leyenda de colores -->
        <div class="flex flex-wrap items-center gap-x-4 gap-y-1.5 pt-2 border-t border-[#EBF0FA]">
            <span class="text-[10px] font-bold uppercase tracking-[1px] text-[#8A9DC0] shrink-0">Referencia</span>

            <span class="flex items-center gap-1.5 text-[11px] text-slate-600 shrink-0">
                <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 shrink-0"></span>
                Realizado
            </span>

            <span class="flex items-center gap-1.5 text-[11px] text-slate-600 shrink-0">
                <span class="w-2.5 h-2.5 rounded-full bg-amber-500 shrink-0"></span>
                Sin evidencia (reportado)
            </span>

            <span class="flex items-center gap-1.5 text-[11px] text-slate-600 shrink-0">
                <span class="w-2.5 h-2.5 rounded-full bg-purple-500 shrink-0"></span>
                En ejecución (genera reporte)
            </span>

            <span class="flex items-center gap-1.5 text-[11px] text-slate-600 shrink-0">
                <span class="w-2.5 h-2.5 rounded-full bg-blue-500 shrink-0"></span>
                En ejecución
            </span>

            <span class="flex items-center gap-1.5 text-[11px] text-slate-600 shrink-0">
                <span class="w-2.5 h-2.5 rounded-full bg-red-500 shrink-0"></span>
                Pendiente vencida
            </span>
        </div>

    </div>
</div>
